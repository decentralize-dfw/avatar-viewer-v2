<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IP-AXIS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <style>
:root {
    --white: #FFFFFF;
    --grey-50: #FAFAFA;
    --grey-100: #F5F5F5;
    --grey-200: #EEEEEE;
    --grey-300: #E0E0E0;
    --grey-400: #BDBDBD;
    --grey-500: #9E9E9E;
    --grey-600: #757575;
    --grey-700: #616161;
    --grey-800: #424242;
    --grey-900: #212121;
    --black: #000000;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    height: 100%;
    overflow: hidden;
}

body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--grey-100);
    color: var(--grey-900);
    -webkit-font-smoothing: antialiased;
}

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--grey-300); border-radius: 4px; }

/* ═══════════════════════════════════════
   MAIN LAYOUT
═══════════════════════════════════════ */
.app {
    height: 100vh;
    position: relative;
}

/* ═══════════════════════════════════════
   VIEWER - Full screen 3D
═══════════════════════════════════════ */
.viewer {
    position: absolute;
    inset: 0;
    background: var(--grey-100);
}

.viewer-canvas-wrap {
    position: absolute;
    inset: 0;
}

#viewer-canvas {
    width: 100%;
    height: 100%;
    filter: brightness(1.2) contrast(1.1) grayscale(0.2);
}

#pixel-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    opacity: 0.8;
    image-rendering: pixelated;
    filter: contrast(1.5) saturate(0);
    mix-blend-mode: hard-light;
}

/* Loading */
.loader {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--grey-100);
    z-index: 50;
}

.loader-inner { text-align: center; }

.loader-text {
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 3px;
    color: var(--grey-400);
    text-transform: uppercase;
    margin-bottom: 12px;
}

.loader-bar {
    width: 60px;
    height: 1px;
    background: var(--grey-300);
    margin: 0 auto;
}

.loader-progress {
    height: 100%;
    background: var(--grey-600);
    width: 0%;
    transition: width 0.1s;
}

/* ═══════════════════════════════════════
   TOP BAR
═══════════════════════════════════════ */
.top-bar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 40px;
    z-index: 100;
    pointer-events: none;
}

.top-bar > * { pointer-events: auto; }

.logo {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 2px;
    color: var(--grey-700);
}

.nav-toggle {
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 1.5px;
    color: var(--grey-500);
    background: none;
    border: none;
    cursor: pointer;
    padding: 8px 0;
    transition: color 0.3s;
    text-transform: uppercase;
}

.nav-toggle:hover { color: var(--grey-800); }

.collections-nav {
    display: flex;
    gap: 20px;
}

.collection-btn {
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 1px;
    color: var(--grey-400);
    background: none;
    border: none;
    cursor: pointer;
    padding: 8px 0;
    transition: color 0.3s;
    text-transform: uppercase;
}

.collection-btn:hover { color: var(--grey-600); }
.collection-btn.active { color: var(--grey-800); }

/* ═══════════════════════════════════════
   LEFT PANEL - Video on top, info below
═══════════════════════════════════════ */
.left-panel {
    position: fixed;
    left: 40px;
    bottom: 100px;
    width: 140px;
    z-index: 90;
    display: flex;
    flex-direction: column;
    gap: 20px;
}

/* Video */
.video-wrap {
    position: relative;
    aspect-ratio: 9/16;
    background: var(--grey-200);
    overflow: hidden;
    border-radius: 4px;
    border: 1px solid var(--grey-300);
}

#main-video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: grayscale(1) contrast(1.2) brightness(0.9);
}

#video-pixel-fx {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    opacity: 0.4;
    mix-blend-mode: hard-light;
    image-rendering: pixelated;
}

/* Info below video */
.info-content {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.avatar-title {
    font-size: 18px;
    font-weight: 300;
    letter-spacing: -0.5px;
    line-height: 1.2;
    color: var(--grey-800);
}

.avatar-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
}

.meta-tag {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 1px;
    color: var(--grey-400);
    text-transform: uppercase;
}

.avatar-desc {
    font-size: 11px;
    font-weight: 300;
    line-height: 1.7;
    color: var(--grey-500);
}

/* ═══════════════════════════════════════
   RIGHT - Detail toggle
═══════════════════════════════════════ */
.detail-toggle {
    position: fixed;
    right: 40px;
    top: 50%;
    transform: translateY(-50%);
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 90;
    color: var(--grey-400);
    border: 1px solid var(--grey-300);
    border-radius: 4px;
    background: var(--white);
    transition: all 0.3s;
}

.detail-toggle:hover {
    color: var(--grey-700);
    border-color: var(--grey-400);
}

.detail-toggle i { font-size: 12px; }

/* Detail Panel */
.detail-panel {
    position: fixed;
    right: 0;
    top: 0;
    bottom: 0;
    width: 340px;
    background: var(--white);
    border-left: 1px solid var(--grey-200);
    padding: 80px 32px 32px;
    overflow-y: auto;
    z-index: 80;
    transform: translateX(100%);
    transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}

.detail-panel.open { transform: translateX(0); }

.detail-section { margin-bottom: 32px; }

.detail-label {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 1.5px;
    color: var(--grey-400);
    text-transform: uppercase;
    margin-bottom: 10px;
}

.detail-content {
    font-size: 12px;
    font-weight: 300;
    line-height: 1.8;
    color: var(--grey-600);
}

/* ═══════════════════════════════════════
   BOTTOM NAV
═══════════════════════════════════════ */
.bottom-nav {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    height: 72px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    z-index: 100;
    background: linear-gradient(to top, var(--grey-100) 60%, transparent);
    padding-bottom: 20px;
}

.nav-arrow {
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--grey-400);
    transition: color 0.3s;
}

.nav-arrow:hover { color: var(--grey-800); }

.nav-dots {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 0 12px;
}

.nav-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--grey-300);
    cursor: pointer;
    transition: all 0.3s;
}

.nav-dot:hover { background: var(--grey-500); }

.nav-dot.active {
    background: var(--grey-700);
    width: 20px;
    border-radius: 3px;
}

.nav-counter {
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 1px;
    color: var(--grey-400);
    margin-left: 12px;
}

/* ═══════════════════════════════════════
   GRID VIEW - Clean gallery
═══════════════════════════════════════ */
.grid-view {
    position: fixed;
    inset: 0;
    background: var(--white);
    z-index: 200;
    display: none;
    overflow-y: auto;
}

.grid-view.open { display: block; }

.grid-header {
    position: sticky;
    top: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 24px 40px;
    background: var(--white);
    border-bottom: 1px solid var(--grey-200);
    z-index: 10;
}

.grid-title {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 2px;
    color: var(--grey-500);
    text-transform: uppercase;
}

.grid-close {
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 1px;
    color: var(--grey-400);
    background: none;
    border: none;
    cursor: pointer;
    text-transform: uppercase;
    transition: color 0.3s;
}

.grid-close:hover { color: var(--grey-700); }

.grid-container {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 1px;
    background: var(--grey-200);
    padding: 1px;
}

.grid-item {
    position: relative;
    aspect-ratio: 3/4;
    background: var(--grey-100);
    overflow: hidden;
    cursor: pointer;
}

.grid-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: grayscale(0.4);
    transition: all 0.4s;
}

.grid-item:hover img {
    filter: grayscale(0);
    transform: scale(1.03);
}

.grid-item-info {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 16px;
    background: linear-gradient(to top, rgba(0,0,0,0.6), transparent);
    opacity: 0;
    transition: opacity 0.3s;
}

.grid-item:hover .grid-item-info { opacity: 1; }

.grid-item-name {
    font-size: 12px;
    font-weight: 400;
    color: var(--white);
}

.grid-item-meta {
    font-size: 9px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.5px;
    margin-top: 2px;
    text-transform: uppercase;
}

/* ═══════════════════════════════════════
   MODAL
═══════════════════════════════════════ */
.modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    z-index: 500;
    display: none;
    align-items: center;
    justify-content: center;
}

.modal.open { display: flex; }

.modal-content {
    width: 85%;
    max-width: 800px;
    height: 75%;
    background: var(--white);
    position: relative;
    border-radius: 4px;
    overflow: hidden;
}

.modal-header {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    border-bottom: 1px solid var(--grey-200);
    background: var(--white);
}

.modal-title {
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 1px;
    color: var(--grey-500);
}

.modal-controls { display: flex; gap: 8px; }

.modal-btn {
    width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: none;
    border: 1px solid var(--grey-200);
    border-radius: 3px;
    cursor: pointer;
    color: var(--grey-400);
    transition: all 0.2s;
    font-size: 10px;
}

.modal-btn:hover {
    border-color: var(--grey-400);
    color: var(--grey-700);
}

.modal-body {
    position: absolute;
    top: 44px;
    left: 0;
    right: 0;
    bottom: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--grey-100);
}

.modal-body iframe,
.modal-body video,
.modal-body img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
}

/* ═══════════════════════════════════════
   TOOLS
═══════════════════════════════════════ */
.tools {
    position: fixed;
    right: 40px;
    bottom: 100px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 90;
}

.tool-btn {
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--white);
    border: 1px solid var(--grey-300);
    border-radius: 4px;
    cursor: pointer;
    color: var(--grey-400);
    transition: all 0.3s;
    font-size: 11px;
}

.tool-btn:hover {
    border-color: var(--grey-400);
    color: var(--grey-700);
}

/* ═══════════════════════════════════════
   MOBILE INFO MODAL
═══════════════════════════════════════ */
.mobile-info-modal {
    position: fixed;
    inset: 5%;
    background: var(--white);
    z-index: 300;
    display: none;
    flex-direction: column;
    border-radius: 8px;
    overflow: hidden;
}

.mobile-info-modal.open { display: flex; }

.mobile-info-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.3);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 290;
    display: none;
}

.mobile-info-backdrop.open { display: block; }

.mobile-info-header {
    display: flex;
    justify-content: flex-end;
    padding: 16px;
    border-bottom: 1px solid var(--grey-200);
}

.mobile-info-close {
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: none;
    border: 1px solid var(--grey-300);
    border-radius: 4px;
    cursor: pointer;
    color: var(--grey-500);
    font-size: 12px;
}

.mobile-info-body {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
}

.mobile-info-title {
    font-size: 24px;
    font-weight: 300;
    color: var(--grey-800);
    margin-bottom: 16px;
}

.mobile-info-meta {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
}

.mobile-info-tag {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 1px;
    color: var(--grey-400);
    text-transform: uppercase;
}

.mobile-info-desc {
    font-size: 13px;
    font-weight: 300;
    line-height: 1.8;
    color: var(--grey-600);
    margin-bottom: 32px;
}

.mobile-info-section { margin-bottom: 24px; }

.mobile-info-label {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 1.5px;
    color: var(--grey-400);
    text-transform: uppercase;
    margin-bottom: 8px;
}

.mobile-info-text {
    font-size: 13px;
    font-weight: 300;
    line-height: 1.8;
    color: var(--grey-600);
}

/* Mobile Info Button */
.mobile-info-btn {
    display: none;
    position: fixed;
    left: 20px;
    top: 50%;
    transform: translateY(-50%);
    width: 36px;
    height: 36px;
    align-items: center;
    justify-content: center;
    background: var(--white);
    border: 1px solid var(--grey-300);
    border-radius: 50%;
    cursor: pointer;
    color: var(--grey-500);
    z-index: 95;
    font-size: 14px;
}

/* ═══════════════════════════════════════
   RESPONSIVE
═══════════════════════════════════════ */
@media (max-width: 1200px) {
    .grid-container { grid-template-columns: repeat(4, 1fr); }
}

@media (max-width: 900px) {
    .grid-container { grid-template-columns: repeat(3, 1fr); }
    .left-panel { width: 120px; left: 32px; }
    .avatar-title { font-size: 16px; }
}

@media (max-width: 768px) {
    .top-bar {
        padding: 0 20px;
        height: 52px;
    }

    .collections-nav { display: none; }
    .left-panel { display: none; }
    .detail-toggle { display: none; }
    .tools { display: none; }

    /* Show mobile info button */
    .mobile-info-btn { display: flex; }

    .grid-container { grid-template-columns: repeat(2, 1fr); }

    .grid-view { padding: 0; }
    .grid-header { padding: 16px 20px; }

    .bottom-nav {
        height: 60px;
        padding-bottom: 16px;
    }

    .nav-counter { display: none; }
}
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/RGBELoader.js"></script>
    <script src="https://unpkg.com/meshoptimizer@0.18.1/meshopt_decoder.js"></script>
</head>
<body>

<div class="app">
    <!-- 3D Viewer -->
    <div class="viewer">
        <div class="viewer-canvas-wrap">
            <canvas id="viewer-canvas"></canvas>
            <canvas id="pixel-canvas"></canvas>
        </div>
        <div class="loader" id="loader">
            <div class="loader-inner">
                <div class="loader-text">Loading</div>
                <div class="loader-bar">
                    <div class="loader-progress" id="loader-progress"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Top Bar -->
    <header class="top-bar">
        <div class="logo">IP-AXIS</div>
        <button class="nav-toggle" id="grid-toggle">Index</button>
        <nav class="collections-nav" id="collections-nav"></nav>
    </header>

    <!-- Left Panel: Video + Info -->
    <aside class="left-panel">
        <div class="video-wrap">
            <video id="main-video" loop muted autoplay playsinline></video>
            <canvas id="video-pixel-fx"></canvas>
        </div>
        <div class="info-content">
            <h1 class="avatar-title" id="avatar-title">Loading</h1>
            <div class="avatar-meta" id="avatar-meta"></div>
            <p class="avatar-desc" id="avatar-desc"></p>
        </div>
    </aside>

    <!-- Tools -->
    <div class="tools">
        <button class="tool-btn" onclick="openModal('image')"><i class="fas fa-image"></i></button>
        <button class="tool-btn" onclick="openModal('video-mp4')"><i class="fas fa-play"></i></button>
        <button class="tool-btn" onclick="openModal('web')"><i class="fas fa-globe"></i></button>
    </div>

    <!-- Detail Toggle -->
    <div class="detail-toggle" id="detail-toggle">
        <i class="fas fa-info"></i>
    </div>

    <!-- Detail Panel -->
    <aside class="detail-panel" id="detail-panel">
        <div id="detail-content"></div>
    </aside>

    <!-- Mobile Info Button -->
    <button class="mobile-info-btn" id="mobile-info-btn">
        <i class="fas fa-info"></i>
    </button>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
        <div class="nav-arrow" id="nav-prev"><i class="fas fa-chevron-left"></i></div>
        <div class="nav-dots" id="nav-dots"></div>
        <div class="nav-arrow" id="nav-next"><i class="fas fa-chevron-right"></i></div>
        <div class="nav-counter" id="nav-counter">01 / 24</div>
    </nav>
</div>

<!-- Grid View -->
<div class="grid-view" id="grid-view">
    <div class="grid-header">
        <span class="grid-title">Index</span>
        <button class="grid-close" id="grid-close">Close</button>
    </div>
    <div class="grid-container" id="grid-container"></div>
</div>

<!-- Mobile Info Modal -->
<div class="mobile-info-backdrop" id="mobile-info-backdrop"></div>
<div class="mobile-info-modal" id="mobile-info-modal">
    <div class="mobile-info-header">
        <button class="mobile-info-close" id="mobile-info-close"><i class="fas fa-times"></i></button>
    </div>
    <div class="mobile-info-body" id="mobile-info-body"></div>
</div>

<!-- Modal -->
<div class="modal" id="modal">
    <div class="modal-content">
        <div class="modal-header">
            <span class="modal-title" id="modal-title">Viewer</span>
            <div class="modal-controls">
                <button class="modal-btn" id="modal-newtab"><i class="fas fa-external-link-alt"></i></button>
                <button class="modal-btn" id="modal-close"><i class="fas fa-times"></i></button>
            </div>
        </div>
        <div class="modal-body" id="modal-body"></div>
    </div>
</div>

<script>
// ═══════════════════════════════════════
// DATA
// ═══════════════════════════════════════
let avatarBriefInfo = {};
let avatarDetailedInfo = {};
let avatarData = [];
let activeAvatar = null;
let activeCollection = "ALL";
let isModelLoading = false;

const CONFIG = {
    pixelFactor: 0.1,
    modelScale: 0.8,
    camera: { x: 0, y: 1.2, z: 3 },
    target: { x: 0, y: 0.8, z: 0 }
};

// ═══════════════════════════════════════
// THREE.JS
// ═══════════════════════════════════════
let scene, camera, renderer, pixelRenderer, controls, clock = new THREE.Clock();
let mixer = null, currentModel = null;

function initScene() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0xf5f5f5);

    const container = document.querySelector('.viewer-canvas-wrap');
    const aspect = container.clientWidth / container.clientHeight;

    camera = new THREE.PerspectiveCamera(50, aspect, 0.01, 1000);
    camera.position.set(CONFIG.camera.x, CONFIG.camera.y, CONFIG.camera.z);

    renderer = new THREE.WebGLRenderer({
        canvas: document.getElementById('viewer-canvas'),
        antialias: true,
        alpha: true
    });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.outputEncoding = THREE.sRGBEncoding;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;

    pixelRenderer = new THREE.WebGLRenderer({
        canvas: document.getElementById('pixel-canvas'),
        antialias: false,
        alpha: true
    });
    pixelRenderer.setPixelRatio(1);
    pixelRenderer.setSize(container.clientWidth * CONFIG.pixelFactor, container.clientHeight * CONFIG.pixelFactor, false);

    controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.minDistance = 1.5;
    controls.maxDistance = 6;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.5;
    controls.target.set(CONFIG.target.x, CONFIG.target.y, CONFIG.target.z);

    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 10, 7.5);
    scene.add(dirLight);

    new THREE.RGBELoader().load(
        'https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/equirectangular/venice_sunset_1k.hdr',
        (texture) => {
            texture.mapping = THREE.EquirectangularReflectionMapping;
            scene.environment = texture;
        }
    );

    window.addEventListener('resize', onResize);
    animate();
}

function animate() {
    requestAnimationFrame(animate);
    if (mixer) mixer.update(clock.getDelta());
    controls.update();
    renderer.render(scene, camera);
    pixelRenderer.render(scene, camera);
    updateVideoPixel();
}

function onResize() {
    const container = document.querySelector('.viewer-canvas-wrap');
    camera.aspect = container.clientWidth / container.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(container.clientWidth, container.clientHeight);
    pixelRenderer.setSize(container.clientWidth * CONFIG.pixelFactor, container.clientHeight * CONFIG.pixelFactor, false);
}

function loadModel(url) {
    document.getElementById('loader').style.display = 'flex';
    document.getElementById('loader-progress').style.width = '0%';

    if (currentModel) {
        scene.remove(currentModel);
        currentModel = null;
    }

    const loader = new THREE.GLTFLoader();
    if (typeof MeshoptDecoder !== 'undefined') {
        loader.setMeshoptDecoder(MeshoptDecoder);
    }

    loader.load(
        url,
        (gltf) => {
            currentModel = gltf.scene;
            currentModel.scale.setScalar(CONFIG.modelScale);
            scene.add(currentModel);

            if (gltf.animations?.length) {
                mixer = new THREE.AnimationMixer(currentModel);
                gltf.animations.forEach(clip => mixer.clipAction(clip).play());
            }

            document.getElementById('loader').style.display = 'none';
            isModelLoading = false;
        },
        (progress) => {
            const pct = Math.round((progress.loaded / progress.total) * 100);
            document.getElementById('loader-progress').style.width = pct + '%';
        },
        () => {
            document.getElementById('loader').style.display = 'none';
            isModelLoading = false;
        }
    );
}

// ═══════════════════════════════════════
// VIDEO PIXEL
// ═══════════════════════════════════════
let videoCanvas, videoCtx, videoEl;

function initVideoPixel() {
    videoEl = document.getElementById('main-video');
    videoCanvas = document.getElementById('video-pixel-fx');
    videoCtx = videoCanvas.getContext('2d');
    videoCtx.imageSmoothingEnabled = false;
}

function updateVideoPixel() {
    if (!videoEl || videoEl.paused || videoEl.ended) return;
    const rect = videoCanvas.getBoundingClientRect();
    const w = Math.floor(rect.width * CONFIG.pixelFactor);
    const h = Math.floor(rect.height * CONFIG.pixelFactor);
    if (w > 0 && h > 0) {
        videoCanvas.width = w;
        videoCanvas.height = h;
        videoCtx.drawImage(videoEl, 0, 0, w, h);
    }
}

// ═══════════════════════════════════════
// DATA LOADING
// ═══════════════════════════════════════
async function loadExternalBriefInfo() {
    try {
        const response = await fetch('https://raw.githubusercontent.com/decentralize-dfw/avatar-viewer-v2/refs/heads/main/avatarBriefInfo.txt');
        if (!response.ok) throw new Error("Network response was not ok");
        const text = await response.text();
        const cleanText = text.replace(/const\s+avatarBriefInfo\s*=\s*/, '').trim().replace(/;$/, '');
        avatarBriefInfo = new Function(`return ${cleanText}`)();
    } catch (error) {
        console.warn("Brief info could not be loaded/parsed.", error);
    }
}

async function loadExternalDetailedInfo() {
    try {
        const response = await fetch('https://raw.githubusercontent.com/decentralize-dfw/avatar-viewer-v2/refs/heads/main/avatarDetailedInfo.txt');
        if (!response.ok) throw new Error("Network response was not ok");
        const text = await response.text();
        const cleanText = text.replace(/const\s+avatarDetailedInfo\s*=\s*/, '').trim().replace(/;$/, '');
        avatarDetailedInfo = new Function(`return ${cleanText}`)();
    } catch (error) {
        console.warn("Detailed info could not be loaded/parsed.", error);
    }
}

async function loadExternalAvatarData() {
    try {
        const response = await fetch('https://raw.githubusercontent.com/decentralize-dfw/avatar-viewer-v2/refs/heads/main/avatarfiles.txt');
        if (!response.ok) throw new Error("Network response was not ok");
        const text = await response.text();

        let cleanText = text.trim();
        if (cleanText.startsWith('const')) {
             cleanText = cleanText.replace(/const\s+avatarData\s*=\s*/, '').trim().replace(/;$/, '');
        }

        avatarData = new Function(`return ${cleanText}`)();
    } catch (error) {
        console.error("Avatar data could not be loaded.", error);
        avatarData = [];
    }
}

// ═══════════════════════════════════════
// UI
// ═══════════════════════════════════════
function loadAvatar(avatar) {
    if (isModelLoading || !avatar) return;
    isModelLoading = true;
    activeAvatar = avatar;

    document.getElementById('avatar-title').textContent = avatar.name;

    const meta = document.getElementById('avatar-meta');
    meta.innerHTML = `
        <span class="meta-tag">Fit ${avatar.fitNo}</span>
        <span class="meta-tag">${avatar.collection}</span>
    `;

    document.getElementById('avatar-desc').textContent = avatarBriefInfo[avatar.name] || '';

    // Detail panel
    const detail = avatarDetailedInfo[avatar.name];
    const detailEl = document.getElementById('detail-content');
    if (detail) {
        detailEl.innerHTML = `
            <div class="detail-section">
                <div class="detail-label">Visual</div>
                <div class="detail-content">${detail.visual}</div>
            </div>
            <div class="detail-section">
                <div class="detail-label">Sound</div>
                <div class="detail-content">${detail.sound}</div>
            </div>
            <div class="detail-section">
                <div class="detail-label">Concept</div>
                <div class="detail-content">${detail.concept}</div>
            </div>
        `;
    } else {
        detailEl.innerHTML = `
            <div class="detail-section">
                <div class="detail-label">Info</div>
                <div class="detail-content">
                    Part ${avatar.runwayPart}<br>
                    Fit #${avatar.fitNo}<br>
                    ${avatar.collection}
                </div>
            </div>
        `;
    }

    // Video
    const video = document.getElementById('main-video');
    video.src = avatar.videoUrl;
    video.load();
    video.play().catch(() => {});

    loadModel(avatar.modelUrl);
    updateNav();
}

function updateNav() {
    const filtered = getFiltered();
    const idx = filtered.indexOf(activeAvatar);
    const total = filtered.length;

    document.getElementById('nav-counter').textContent =
        String(idx + 1).padStart(2, '0') + ' / ' + String(total).padStart(2, '0');

    const dots = document.getElementById('nav-dots');
    dots.innerHTML = '';

    const maxDots = Math.min(total, 12);
    const start = Math.max(0, Math.min(idx - 5, total - maxDots));

    for (let i = start; i < start + maxDots; i++) {
        const dot = document.createElement('div');
        dot.className = 'nav-dot' + (i === idx ? ' active' : '');
        dot.onclick = () => loadAvatar(filtered[i]);
        dots.appendChild(dot);
    }
}

function getFiltered() {
    return activeCollection === 'ALL'
        ? avatarData
        : avatarData.filter(a => a.collection === activeCollection);
}

function navigate(dir) {
    const filtered = getFiltered();
    const idx = filtered.indexOf(activeAvatar);
    let next = idx + dir;
    if (next < 0) next = filtered.length - 1;
    if (next >= filtered.length) next = 0;
    loadAvatar(filtered[next]);
}

// ═══════════════════════════════════════
// COLLECTIONS
// ═══════════════════════════════════════
function setupCollections() {
    const collections = [...new Set(avatarData.map(a => a.collection))];
    const nav = document.getElementById('collections-nav');

    const allBtn = document.createElement('button');
    allBtn.className = 'collection-btn active';
    allBtn.textContent = 'All';
    allBtn.onclick = () => setCollection('ALL');
    nav.appendChild(allBtn);

    collections.forEach(c => {
        const btn = document.createElement('button');
        btn.className = 'collection-btn';
        btn.textContent = c;
        btn.onclick = () => setCollection(c);
        nav.appendChild(btn);
    });
}

function setCollection(c) {
    activeCollection = c;
    document.querySelectorAll('.collection-btn').forEach(btn => {
        btn.classList.toggle('active',
            (c === 'ALL' && btn.textContent === 'All') ||
            btn.textContent === c
        );
    });
    const filtered = getFiltered();
    if (filtered.length) loadAvatar(filtered[0]);
    buildGrid();
}

// ═══════════════════════════════════════
// GRID
// ═══════════════════════════════════════
function buildGrid() {
    const container = document.getElementById('grid-container');
    container.innerHTML = '';

    getFiltered().forEach(avatar => {
        const item = document.createElement('div');
        item.className = 'grid-item';
        item.innerHTML = `
            <img src="${avatar.thumbnailUrl}" alt="${avatar.name}">
            <div class="grid-item-info">
                <div class="grid-item-name">${avatar.name}</div>
                <div class="grid-item-meta">${avatar.collection}</div>
            </div>
        `;
        item.onclick = () => {
            loadAvatar(avatar);
            toggleGrid(false);
        };
        container.appendChild(item);
    });
}

function toggleGrid(open) {
    document.getElementById('grid-view').classList.toggle('open', open);
}

// ═══════════════════════════════════════
// MOBILE INFO MODAL
// ═══════════════════════════════════════
function openMobileInfo() {
    if (!activeAvatar) return;

    const body = document.getElementById('mobile-info-body');
    const detail = avatarDetailedInfo[activeAvatar.name];
    const brief = avatarBriefInfo[activeAvatar.name] || '';

    let html = `
        <div class="mobile-info-title">${activeAvatar.name}</div>
        <div class="mobile-info-meta">
            <span class="mobile-info-tag">Fit ${activeAvatar.fitNo}</span>
            <span class="mobile-info-tag">${activeAvatar.collection}</span>
        </div>
        <div class="mobile-info-desc">${brief}</div>
    `;

    if (detail) {
        html += `
            <div class="mobile-info-section">
                <div class="mobile-info-label">Visual</div>
                <div class="mobile-info-text">${detail.visual}</div>
            </div>
            <div class="mobile-info-section">
                <div class="mobile-info-label">Sound</div>
                <div class="mobile-info-text">${detail.sound}</div>
            </div>
            <div class="mobile-info-section">
                <div class="mobile-info-label">Concept</div>
                <div class="mobile-info-text">${detail.concept}</div>
            </div>
        `;
    }

    body.innerHTML = html;
    document.getElementById('mobile-info-backdrop').classList.add('open');
    document.getElementById('mobile-info-modal').classList.add('open');
}

function closeMobileInfo() {
    document.getElementById('mobile-info-backdrop').classList.remove('open');
    document.getElementById('mobile-info-modal').classList.remove('open');
}

// ═══════════════════════════════════════
// MODAL
// ═══════════════════════════════════════
const modalData = {
    'image': { title: 'Image', url: 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=1000', type: 'image' },
    'video-mp4': { title: 'Video', url: 'https://www.w3schools.com/html/mov_bbb.mp4', type: 'video' },
    'web': { title: 'Web', url: 'https://en.wikipedia.org/wiki/Main_Page', type: 'iframe' }
};

let currentModal = null;

function openModal(type) {
    const data = modalData[type];
    if (!data) return;

    currentModal = data;
    document.getElementById('modal-title').textContent = data.title;

    const body = document.getElementById('modal-body');
    if (data.type === 'image') {
        body.innerHTML = `<img src="${data.url}">`;
    } else if (data.type === 'video') {
        body.innerHTML = `<video controls autoplay><source src="${data.url}" type="video/mp4"></video>`;
    } else {
        body.innerHTML = `<iframe src="${data.url}" style="width:100%;height:100%;border:none;"></iframe>`;
    }

    document.getElementById('modal').classList.add('open');
}

function closeModal() {
    const body = document.getElementById('modal-body');
    body.querySelectorAll('video').forEach(v => { v.pause(); v.src = ''; });
    body.querySelectorAll('iframe').forEach(f => { f.src = 'about:blank'; });
    body.innerHTML = '';
    document.getElementById('modal').classList.remove('open');
    currentModal = null;
}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
async function init() {
    initScene();
    initVideoPixel();

    await Promise.all([loadExternalBriefInfo(), loadExternalDetailedInfo(), loadExternalAvatarData()]);

    if (avatarData.length) {
        setupCollections();
        buildGrid();
        loadAvatar(avatarData[0]);
    }

    // Events
    document.getElementById('grid-toggle').onclick = () => toggleGrid(true);
    document.getElementById('grid-close').onclick = () => toggleGrid(false);
    document.getElementById('nav-prev').onclick = () => navigate(-1);
    document.getElementById('nav-next').onclick = () => navigate(1);
    document.getElementById('modal-close').onclick = closeModal;
    document.getElementById('modal-newtab').onclick = () => {
        if (currentModal) window.open(currentModal.url, '_blank');
    };

    document.getElementById('detail-toggle').onclick = () => {
        document.getElementById('detail-panel').classList.toggle('open');
    };

    // Mobile info
    document.getElementById('mobile-info-btn').onclick = openMobileInfo;
    document.getElementById('mobile-info-close').onclick = closeMobileInfo;
    document.getElementById('mobile-info-backdrop').onclick = closeMobileInfo;

    document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowLeft') navigate(-1);
        if (e.key === 'ArrowRight') navigate(1);
        if (e.key === 'Escape') {
            closeModal();
            toggleGrid(false);
            closeMobileInfo();
            document.getElementById('detail-panel').classList.remove('open');
        }
    });
}

if (typeof MeshoptDecoder !== 'undefined') {
    THREE.GLTFLoader.prototype.setMeshoptDecoder = function(d) {
        this.meshoptDecoder = d;
        return this;
    };
}

document.addEventListener('DOMContentLoaded', init);
</script>
