<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IP-AXIS Studio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=SF+Pro+Display:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
/* --- RESET & FONTS --- */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

:root {
    /* Bone/Cream Color Palette */
    --bone-100: #FEFDFB;
    --bone-200: #FAF8F5;
    --bone-300: #F5F2ED;
    --bone-400: #EBE6DE;
    --bone-500: #DED8CC;
    --bone-600: #C9C1B1;
    --bone-700: #A89F8E;
    --bone-800: #857C6D;
    --bone-900: #5C554A;

    /* Accent Colors */
    --accent-warm: #B8A88A;
    --accent-soft: #9A8F7D;
    --text-primary: #2C2924;
    --text-secondary: #6B6459;
    --text-tertiary: #9A9488;

    /* Glass Effect */
    --glass-bg: rgba(254, 253, 251, 0.72);
    --glass-border: rgba(222, 216, 204, 0.5);
    --glass-shadow: 0 8px 32px rgba(92, 85, 74, 0.08);

    /* Transitions */
    --transition-smooth: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    --transition-fast: all 0.2s ease;
}

body {
    background: linear-gradient(145deg, var(--bone-200) 0%, var(--bone-300) 50%, var(--bone-400) 100%);
    min-height: 100vh;
    overflow: hidden;
    color: var(--text-primary);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
    font-size: 14px;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
}

/* --- CUSTOM SCROLLBAR (Minimal) --- */
::-webkit-scrollbar {
    width: 6px;
    height: 6px;
}
::-webkit-scrollbar-track {
    background: transparent;
}
::-webkit-scrollbar-thumb {
    background: var(--bone-600);
    border-radius: 10px;
}
::-webkit-scrollbar-thumb:hover {
    background: var(--bone-700);
}

/* --- AMBIENT BACKGROUND --- */
.ambient-bg {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 0;
    pointer-events: none;
    background:
        radial-gradient(ellipse 80% 50% at 20% 20%, rgba(184, 168, 138, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(154, 143, 125, 0.06) 0%, transparent 50%);
}

.container {
    display: flex;
    flex-direction: column;
    height: 100vh;
    width: 100vw;
    position: relative;
    z-index: 1;
}

/* --- TOP HEADER --- */
.top-section {
    height: 64px;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 32px;
    background: var(--glass-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    z-index: 10;
    border-bottom: 1px solid var(--glass-border);
}

.title {
    font-size: 15px;
    color: var(--text-primary);
    font-weight: 600;
    letter-spacing: 0.5px;
    width: 240px;
}

.title span {
    font-weight: 300;
    color: var(--text-tertiary);
}

/* CENTER: VIEW TOGGLE */
.center-menu {
    flex: 1;
    display: flex;
    justify-content: center;
}

.grid-toggle-text-btn {
    background: var(--bone-100);
    border: 1px solid var(--bone-500);
    color: var(--text-secondary);
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    padding: 10px 24px;
    cursor: pointer;
    letter-spacing: 0.3px;
    transition: var(--transition-fast);
    border-radius: 100px;
    box-shadow: 0 2px 8px rgba(92, 85, 74, 0.06);
}
.grid-toggle-text-btn:hover {
    background: var(--bone-200);
    border-color: var(--bone-600);
    color: var(--text-primary);
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(92, 85, 74, 0.1);
}

/* RIGHT: COLLECTIONS */
.collections {
    display: flex;
    gap: 8px;
    width: 240px;
    justify-content: flex-end;
}

.collection-btn {
    padding: 8px 16px;
    border: 1px solid var(--bone-500);
    background: transparent;
    cursor: pointer;
    font-size: 11px;
    font-weight: 500;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-family: inherit;
    transition: var(--transition-fast);
    border-radius: 8px;
}

.collection-btn:hover {
    background: var(--bone-300);
    border-color: var(--bone-600);
}
.collection-btn.active {
    background: var(--text-primary);
    border-color: var(--text-primary);
    color: var(--bone-100);
}

/* --- MAIN LAYOUT GRID --- */
.main-layout {
    display: grid;
    grid-template-columns: 280px 1fr 340px;
    height: calc(100vh - 144px);
    position: relative;
    z-index: 1;
    gap: 0;
}

/* --- LEFT: VIDEO & INFO SECTION --- */
.left-video-section {
    background: var(--glass-bg);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-right: 1px solid var(--glass-border);
    display: flex;
    flex-direction: column;
    position: relative;
    height: 100%;
    overflow: hidden;
    padding: 24px;
}

.video-header {
    margin-bottom: 16px;
}

.video-label {
    font-size: 10px;
    color: var(--text-tertiary);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-weight: 600;
}

/* Video Wrapper */
.video-wrapper {
    position: relative;
    width: 100%;
    aspect-ratio: 9/16;
    overflow: hidden;
    border-radius: 16px;
    background: var(--bone-400);
    box-shadow: var(--glass-shadow);
    flex-shrink: 0;
    margin-bottom: 20px;
}

/* MAIN VIDEO */
#main-video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: grayscale(1) contrast(1.2) brightness(0.9);
}

/* PIXEL FX CANVAS (VIDEO) - Preserved */
#video-pixel-fx {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 2;
    opacity: 0.4;
    mix-blend-mode: hard-light;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
}

/* Left Panel Info */
.left-info-content {
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 16px;
    overflow-y: auto;
    flex: 1;
    min-height: 0;
}

.avatar-name-section {
    display: flex;
    flex-direction: column;
    gap: 4px;
}

.avatar-name-big {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.3px;
    color: var(--text-primary);
    line-height: 1.2;
}

.avatar-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
}

.tag {
    background: var(--bone-300);
    border: none;
    padding: 6px 12px;
    font-size: 10px;
    color: var(--text-secondary);
    text-transform: uppercase;
    font-weight: 600;
    letter-spacing: 0.5px;
    border-radius: 6px;
}

.brief-info {
    font-size: 13px;
    line-height: 1.7;
    color: var(--text-secondary);
    padding-left: 12px;
    border-left: 2px solid var(--bone-500);
}

/* Tech Icons Section */
.tech-icons-section {
    padding: 16px 0;
    display: flex;
    justify-content: center;
    gap: 12px;
    border-top: 1px solid var(--glass-border);
    margin-top: auto;
}

.tech-icon {
    width: 40px;
    height: 40px;
    border: 1px solid var(--bone-500);
    background: var(--bone-200);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    color: var(--text-secondary);
    transition: var(--transition-fast);
    border-radius: 10px;
    cursor: pointer;
}
.tech-icon:hover {
    color: var(--text-primary);
    border-color: var(--text-primary);
    background: var(--bone-100);
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(92, 85, 74, 0.1);
}

/* --- CENTER: GLB VIEWER --- */
.center-viewer-section {
    position: relative;
    overflow: hidden;
    background: linear-gradient(180deg, var(--bone-300) 0%, var(--bone-400) 100%);
}

.viewer-container {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 1;
}

/* CANVAS SETTINGS - Filters Preserved */
#viewer-canvas {
    width: 100%; height: 100%;
    position: absolute; top: 0; left: 0;
    z-index: 1;
    filter: brightness(1.2) contrast(1.1) grayscale(0.2);
}

#pixel-canvas {
    width: 100%; height: 100%;
    position: absolute; top: 0; left: 0;
    z-index: 2;
    pointer-events: none;
    opacity: 0.8;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    filter: contrast(1.5) saturate(0);
    mix-blend-mode: hard-light;
}

/* Soft vignette instead of harsh overlay */
.viewer-container::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(circle at center, transparent 40%, rgba(222, 216, 204, 0.4) 100%);
    pointer-events: none;
    z-index: 3;
}

/* Minimal frame corners */
.corner-frame {
    position: absolute;
    width: 24px;
    height: 24px;
    border: 2px solid var(--bone-600);
    pointer-events: none;
    z-index: 5;
    opacity: 0.6;
}
.corner-frame.top-left { top: 24px; left: 24px; border-right: none; border-bottom: none; border-radius: 4px 0 0 0; }
.corner-frame.top-right { top: 24px; right: 24px; border-left: none; border-bottom: none; border-radius: 0 4px 0 0; }
.corner-frame.bottom-left { bottom: 24px; left: 24px; border-right: none; border-top: none; border-radius: 0 0 0 4px; }
.corner-frame.bottom-right { bottom: 24px; right: 24px; border-left: none; border-top: none; border-radius: 0 0 4px 0; }

/* --- RIGHT: INFO PANEL --- */
.right-info-panel {
    background: var(--glass-bg);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-left: 1px solid var(--glass-border);
    padding: 28px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 20px;
}

/* Hide name in right panel on desktop */
.right-info-panel .avatar-name-section {
    display: none;
}

.detail-text-box {
    padding: 0;
    background: transparent;
}

.detail-text-box h3 {
    font-size: 10px;
    color: var(--text-tertiary);
    text-transform: uppercase;
    margin-bottom: 10px;
    margin-top: 24px;
    letter-spacing: 1.2px;
    font-weight: 600;
}
.detail-text-box h3:first-child { margin-top: 0; }

.detail-text-box p {
    font-size: 13px;
    line-height: 1.8;
    color: var(--text-secondary);
    margin-bottom: 8px;
}

/* --- LOADING --- */
.loading-overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: var(--bone-300);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 100;
}

.loading-text {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 2px;
    color: var(--text-secondary);
    margin-bottom: 16px;
}

.loading-progress {
    width: 120px;
    height: 3px;
    background: var(--bone-500);
    border-radius: 10px;
    overflow: hidden;
}

.progress-bar {
    height: 100%;
    background: var(--text-primary);
    width: 0%;
    transition: width 0.1s;
    border-radius: 10px;
}

/* Mobile footer - hidden on desktop */
.mobile-footer {
    display: none;
}

/* --- BOTTOM CAROUSEL --- */
.bottom-section {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    height: 80px;
    z-index: 5;
    background: var(--glass-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--glass-border);
    transition: var(--transition-smooth);
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 0 24px;
}

.avatar-carousel {
    display: flex;
    justify-content: center;
    align-items: center;
    flex: 1;
    height: 100%;
    gap: 16px;
    padding: 12px;
    overflow: hidden;
    position: relative;
}

/* Nav Arrows */
.carousel-nav {
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 14px;
    color: var(--text-tertiary);
    transition: var(--transition-fast);
    z-index: 10;
    border-radius: 50%;
    background: var(--bone-200);
    border: 1px solid var(--bone-500);
}
.carousel-nav:hover {
    color: var(--text-primary);
    background: var(--bone-100);
    border-color: var(--bone-600);
    transform: scale(1.05);
}

.avatar-item {
    width: 48px;
    height: 48px;
    cursor: pointer;
    opacity: 0.5;
    border: 2px solid transparent;
    transition: var(--transition-smooth);
    flex-shrink: 0;
    aspect-ratio: 1/1;
    background: var(--bone-400);
    border-radius: 10px;
    overflow: hidden;
}

.avatar-item:hover {
    opacity: 0.8;
    transform: scale(1.08);
}

.avatar-item.active {
    opacity: 1;
    border-color: var(--text-primary);
    transform: scale(1.25);
    box-shadow: 0 8px 24px rgba(92, 85, 74, 0.15);
    z-index: 5;
    border-radius: 12px;
}

.avatar-thumbnail {
    width: 100%;
    height: 100%;
    object-fit: contain;
    filter: grayscale(0.8) brightness(0.9) contrast(1.1);
    image-rendering: pixelated;
    image-rendering: crisp-edges;
}

.avatar-item.active .avatar-thumbnail {
    filter: grayscale(0.3) brightness(1.1) contrast(1.2);
}

/* --- UNIVERSAL VIEWER POP-UP --- */
.viewer-popup {
    position: fixed;
    background: var(--glass-bg);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid var(--glass-border);
    box-shadow: 0 24px 80px rgba(92, 85, 74, 0.2);
    border-radius: 16px;
    z-index: 10000;
    display: none;
    flex-direction: column;
    min-width: 400px;
    min-height: 300px;
    resize: both;
    overflow: hidden;
}

.viewer-popup.active {
    display: flex;
}

.viewer-popup.fullscreen {
    top: 0 !important;
    left: 0 !important;
    width: 100vw !important;
    height: 100vh !important;
    resize: none;
    border-radius: 0;
}

/* Viewer Title Bar */
.viewer-titlebar {
    background: var(--bone-200);
    border-bottom: 1px solid var(--glass-border);
    padding: 12px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: move;
    user-select: none;
}

.viewer-title {
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: 0.3px;
}

.viewer-controls {
    display: flex;
    gap: 8px;
}

.viewer-btn {
    width: 28px;
    height: 28px;
    border: 1px solid var(--bone-500);
    background: var(--bone-100);
    color: var(--text-secondary);
    font-size: 11px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: var(--transition-fast);
    border-radius: 6px;
}

.viewer-btn:hover {
    background: var(--bone-300);
    border-color: var(--bone-600);
    color: var(--text-primary);
}

/* Viewer Content */
.viewer-display {
    flex: 1;
    overflow: auto;
    background: var(--bone-300);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 0;
}

.viewer-display iframe,
.viewer-display video,
.viewer-display img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    border: none;
}

.viewer-display video {
    filter: grayscale(0.3) contrast(1.1);
}

.viewer-display img {
    filter: grayscale(0.2) contrast(1.15);
}

/* Viewer Description */
.viewer-description {
    background: var(--bone-200);
    border-top: 1px solid var(--glass-border);
    padding: 14px 18px;
    font-family: inherit;
    font-size: 12px;
    line-height: 1.6;
    color: var(--text-secondary);
    max-height: 80px;
    overflow: hidden;
}

.viewer-popup.fullscreen .viewer-description {
    display: none;
}

/* --- GRID CONTAINER --- */
.avatar-grid-container {
    position: absolute;
    top: 64px;
    left: 0;
    right: 0;
    bottom: 0;
    padding: 32px;
    overflow-y: auto;
    z-index: 100;
    background: linear-gradient(180deg, var(--bone-200) 0%, var(--bone-300) 100%);
    display: none;
}

/* Grid Layout */
.avatar-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 24px;
    max-width: 1600px;
    margin: 0 auto;
}

/* GRID ITEM CARD */
.grid-item {
    background: var(--glass-bg);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--glass-border);
    padding: 0;
    cursor: pointer;
    position: relative;
    display: flex;
    flex-direction: column;
    transition: var(--transition-smooth);
    box-shadow: var(--glass-shadow);
    overflow: hidden;
    border-radius: 16px;
    opacity: 0.9;
}

.grid-item:hover {
    opacity: 1;
    border-color: var(--bone-600);
    box-shadow: 0 16px 48px rgba(92, 85, 74, 0.12);
    transform: translateY(-4px);
}

/* Grid Item Agent */
.grid-item-agent {
    background: var(--bone-200);
    padding: 16px 20px;
    border-bottom: 1px solid var(--glass-border);
}

.grid-item-agent-label {
    font-family: inherit;
    font-size: 9px;
    color: var(--text-tertiary);
    letter-spacing: 1.5px;
    margin-bottom: 4px;
    text-transform: uppercase;
    font-weight: 600;
}

.grid-item-name {
    font-family: inherit;
    font-size: 16px;
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: -0.2px;
    line-height: 1.3;
}

/* Grid Content */
.grid-item-content {
    display: flex;
    padding: 20px;
    gap: 20px;
    flex: 1;
}

/* Thumbnail */
.grid-item-thumbnail-wrapper {
    width: 120px;
    height: 160px;
    flex-shrink: 0;
    position: relative;
    border-radius: 10px;
    background: var(--bone-400);
    overflow: hidden;
}

.grid-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: brightness(0.9) contrast(1.1) saturate(0.8);
    transition: var(--transition-smooth);
}

.grid-item:hover img {
    filter: brightness(1.05) contrast(1.15) saturate(1);
}

/* Grid Item Info */
.grid-item-info {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

/* Tags */
.grid-item-tags {
    display: flex;
    flex-direction: column;
    gap: 6px;
}

.grid-item-tag {
    font-family: inherit;
    font-size: 10px;
    color: var(--text-secondary);
    letter-spacing: 0.5px;
    padding: 4px 0;
    border-left: 2px solid var(--bone-600);
    padding-left: 10px;
    font-weight: 500;
}

/* Description */
.grid-item-description {
    font-family: inherit;
    font-size: 12px;
    line-height: 1.7;
    color: var(--text-secondary);
    flex: 1;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 5;
    -webkit-box-orient: vertical;
}

/* RESPONSIVE */
@media (max-width: 1800px) {
    .avatar-grid { grid-template-columns: repeat(4, 1fr); }
}

@media (max-width: 1400px) {
    .avatar-grid { grid-template-columns: repeat(3, 1fr); }
}

@media (max-width: 1000px) {
    .avatar-grid { grid-template-columns: repeat(2, 1fr); gap: 20px; }
    .grid-item-thumbnail-wrapper { width: 100px; height: 140px; }
}

@media (max-width: 700px) {
    .avatar-grid { grid-template-columns: 1fr; }
    .avatar-grid-container { padding: 16px; }
}

/* MOBILE RESPONSIVE (768px) */
@media (max-width: 768px) {
    /* Hide collections filter */
    .collections {
        display: none !important;
    }

    /* Top bar simplified */
    .top-section {
        height: 56px;
        padding: 0 16px;
        justify-content: flex-start;
        gap: 12px;
        flex-wrap: nowrap;
        overflow: hidden;
    }

    .title {
        display: none;
    }

    .center-menu {
        flex: 0;
        justify-content: flex-start;
    }

    .grid-toggle-text-btn {
        font-size: 11px;
        padding: 8px 16px;
    }

    /* Main layout: Single column */
    .main-layout {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr auto;
        height: auto;
        padding: 0;
        position: fixed;
        top: 56px;
        left: 0;
        right: 0;
        bottom: 100px;
    }

    /* GLB Viewer: Square */
    .center-viewer-section {
        order: 1;
        aspect-ratio: 1/1;
        width: 100%;
        flex-shrink: 0;
    }

    /* Video: Small overlay */
    .left-video-section {
        order: 1;
        position: absolute;
        top: 72px;
        left: 16px;
        width: 72px;
        height: auto;
        z-index: 20;
        background: var(--glass-bg);
        backdrop-filter: blur(12px);
        border: 1px solid var(--glass-border);

    <script>
// --- DATA VARIABLES ---
let avatarBriefInfo = {};
let avatarDetailedInfo = {};
let avatarData = [];

const CONFIG = {
    viewer: {
        modelScale: 0.8,
        camera: { position: { x: 0, y: 1.2, z: 3 }, target: { x: 0, y: 0.8, z: 0 } },
        pixelFactor: 0.1
    }
};

let scene, camera, renderer, pixelRenderer, controls, clock = new THREE.Clock();
let mixer = null, currentModel = null;
let activeAvatar = null, collections = [], activeCollection = "ALL";
let isModelLoading = false, isGridView = false;

// VIDEO PIXEL FX VARIABLES
let videoPixelCanvas, videoPixelCtx, mainVideoEl;

const hdriPaths = ['https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/equirectangular/venice_sunset_1k.hdr'];

document.addEventListener('DOMContentLoaded', () => {
    initMeshoptDecoder();
    initApp();
});

function initMeshoptDecoder() {
    if (typeof MeshoptDecoder === 'undefined') return;
    THREE.GLTFLoader.prototype.setMeshoptDecoder = function(decoder) {
        this.meshoptDecoder = decoder;
        return this;
    };
}

// 1. DATA FETCHING (Brief Info)
async function loadExternalBriefInfo() {
    try {
        const response = await fetch('https://raw.githubusercontent.com/decentralize-dfw/avatar-viewer-v2/refs/heads/main/avatarBriefInfo.txt');
        if (!response.ok) throw new Error("Network response was not ok");
        const text = await response.text();
        const cleanText = text.replace(/const\s+avatarBriefInfo\s*=\s*/, '').trim().replace(/;$/, '');
        avatarBriefInfo = new Function(`return ${cleanText}`)();
    } catch (error) {
        console.warn("Brief info could not be loaded/parsed.", error);
    }
}

// 2. DATA FETCHING (Detailed Info)
async function loadExternalDetailedInfo() {
    try {
        const response = await fetch('https://raw.githubusercontent.com/decentralize-dfw/avatar-viewer-v2/refs/heads/main/avatarDetailedInfo.txt');
        if (!response.ok) throw new Error("Network response was not ok");
        const text = await response.text();
        const cleanText = text.replace(/const\s+avatarDetailedInfo\s*=\s*/, '').trim().replace(/;$/, '');
        avatarDetailedInfo = new Function(`return ${cleanText}`)();
    } catch (error) {
        console.warn("Detailed info could not be loaded/parsed.", error);
    }
}

// 3. DATA FETCHING (Avatar List)
async function loadExternalAvatarData() {
    try {
        const response = await fetch('https://raw.githubusercontent.com/decentralize-dfw/avatar-viewer-v2/refs/heads/main/avatarfiles.txt');
        if (!response.ok) throw new Error("Network response was not ok");
        const text = await response.text();

        let cleanText = text.trim();
        if (cleanText.startsWith('const')) {
             cleanText = cleanText.replace(/const\s+avatarData\s*=\s*/, '').trim().replace(/;$/, '');
        }

        avatarData = new Function(`return ${cleanText}`)();
    } catch (error) {
        console.error("Avatar data could not be loaded.", error);
        avatarData = [];
    }
}

async function initApp() {
    initScene();
    initVideoPixelFx();

    await Promise.all([loadExternalBriefInfo(), loadExternalDetailedInfo(), loadExternalAvatarData()]);

    setupAvatarSystem();
    setupEventListeners();
    document.getElementById('loading-overlay').style.display = 'none';
}

function setupAvatarSystem() {
    if (!avatarData || avatarData.length === 0) return;

    collections = [...new Set(avatarData.map(avatar => avatar.collection))];
    populateCollectionButtons();
    populateAvatarGrid();
    loadAvatar(avatarData[0]);
}

function initVideoPixelFx() {
    mainVideoEl = document.getElementById('main-video');
    videoPixelCanvas = document.getElementById('video-pixel-fx');
    videoPixelCtx = videoPixelCanvas.getContext('2d');

    videoPixelCtx.imageSmoothingEnabled = false;
    videoPixelCtx.mozImageSmoothingEnabled = false;
    videoPixelCtx.webkitImageSmoothingEnabled = false;
    videoPixelCtx.msImageSmoothingEnabled = false;
}

function updateVideoPixelFx() {
    if (!mainVideoEl || mainVideoEl.paused || mainVideoEl.ended) return;

    const rect = videoPixelCanvas.getBoundingClientRect();
    const pixelRatio = CONFIG.viewer.pixelFactor;

    const lowResW = Math.floor(rect.width * pixelRatio);
    const lowResH = Math.floor(rect.height * pixelRatio);

    if (lowResW > 0 && lowResH > 0) {
        videoPixelCanvas.width = lowResW;
        videoPixelCanvas.height = lowResH;
        videoPixelCtx.drawImage(mainVideoEl, 0, 0, lowResW, lowResH);
    }
}

function initScene() {
    scene = new THREE.Scene();
    scene.background = null;

    const canvasContainer = document.querySelector('.viewer-container');
    const aspect = canvasContainer.clientWidth / canvasContainer.clientHeight;
    camera = new THREE.PerspectiveCamera(50, aspect, 0.01, 1000);
    camera.position.set(CONFIG.viewer.camera.position.x, CONFIG.viewer.camera.position.y, CONFIG.viewer.camera.position.z);

    renderer = new THREE.WebGLRenderer({
        canvas: document.getElementById('viewer-canvas'),
        antialias: true,
        alpha: true,
        powerPreference: 'high-performance'
    });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(canvasContainer.clientWidth, canvasContainer.clientHeight);
    renderer.outputEncoding = THREE.sRGBEncoding;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.physicallyCorrectLights = true;

    pixelRenderer = new THREE.WebGLRenderer({
        canvas: document.getElementById('pixel-canvas'),
        antialias: false,
        alpha: true
    });
    pixelRenderer.setPixelRatio(1);
    pixelRenderer.setSize(
        canvasContainer.clientWidth * CONFIG.viewer.pixelFactor,
        canvasContainer.clientHeight * CONFIG.viewer.pixelFactor,
        false
    );
    pixelRenderer.outputEncoding = THREE.sRGBEncoding;

    controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.minDistance = 1.5;
    controls.maxDistance = 6;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 1.0;
    controls.target.set(CONFIG.viewer.camera.target.x, CONFIG.viewer.camera.target.y, CONFIG.viewer.camera.target.z);
    controls.update();

    window.addEventListener('resize', onWindowResize);

    const rgbeLoader = new THREE.RGBELoader();
    rgbeLoader.load(hdriPaths[0], function(texture) {
        texture.mapping = THREE.EquirectangularReflectionMapping;
        scene.environment = texture;
    });

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);
    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(5, 10, 7.5);
    scene.add(directionalLight);

    animate();
}

function animate() {
    requestAnimationFrame(animate);
    if (mixer) mixer.update(clock.getDelta());
    controls.update();

    renderer.render(scene, camera);
    pixelRenderer.render(scene, camera);

    updateVideoPixelFx();
}

function onWindowResize() {
    const canvasContainer = document.querySelector('.viewer-container');
    camera.aspect = canvasContainer.clientWidth / canvasContainer.clientHeight;
    camera.updateProjectionMatrix();

    renderer.setSize(canvasContainer.clientWidth, canvasContainer.clientHeight);

    pixelRenderer.setSize(
        canvasContainer.clientWidth * CONFIG.viewer.pixelFactor,
        canvasContainer.clientHeight * CONFIG.viewer.pixelFactor,
        false
    );

    renderCircularCarousel();

    if (isGridView) {
        populateAvatarGrid();
    }
}

function populateCollectionButtons() {
    const collectionsContainer = document.getElementById('collections');
    collectionsContainer.innerHTML = '';
    const allBtn = document.createElement('button');
    allBtn.className = 'collection-btn active';
    allBtn.textContent = 'All';
    allBtn.onclick = () => filterCollection('ALL');
    collectionsContainer.appendChild(allBtn);

    collections.forEach(collection => {
        const btn = document.createElement('button');
        btn.className = 'collection-btn';
        btn.textContent = collection.charAt(0).toUpperCase() + collection.slice(1);
        btn.onclick = () => filterCollection(collection);
        collectionsContainer.appendChild(btn);
    });
}

function filterCollection(collection) {
    activeCollection = collection;
    document.querySelectorAll('.collection-btn').forEach(btn => {
        btn.classList.toggle('active', btn.textContent.toUpperCase() === collection || (collection === 'ALL' && btn.textContent === 'All'));
    });
    const filtered = activeCollection === 'ALL' ? avatarData : avatarData.filter(a => a.collection === activeCollection);
    if(filtered.length > 0) {
        loadAvatar(filtered[0]);
    }
    populateAvatarGrid();
}

/* --- CIRCULAR CAROUSEL --- */
function renderCircularCarousel() {
    if (!activeAvatar) return;

    const filteredAvatars = activeCollection === 'ALL' ? avatarData : avatarData.filter(a => a.collection === activeCollection);
    const currentIndex = filteredAvatars.indexOf(activeAvatar);
    const carouselContainer = document.getElementById('avatar-carousel');

    carouselContainer.innerHTML = '';

    const containerWidth = carouselContainer.clientWidth || window.innerWidth;
    const itemFullWidth = 64;
    let totalVisible = Math.floor(containerWidth / itemFullWidth);

    if (totalVisible % 2 === 0) totalVisible--;
    if (totalVisible < 7) totalVisible = 7;

    const offset = Math.floor(totalVisible / 2);

    for (let i = -offset; i <= offset; i++) {
        let targetIndex = (currentIndex + i) % filteredAvatars.length;
        if (targetIndex < 0) targetIndex += filteredAvatars.length;

        const avatar = filteredAvatars[targetIndex];

        const item = document.createElement('div');
        item.className = 'avatar-item' + (i === 0 ? ' active' : '');

        item.onclick = () => {
            loadAvatar(avatar);
        };

        const img = document.createElement('img');
        img.className = 'avatar-thumbnail';
        img.src = avatar.thumbnailUrl;
        img.alt = avatar.name;

        item.appendChild(img);
        carouselContainer.appendChild(item);
    }
}

function populateAvatarGrid() {
    const grid = document.getElementById('avatar-grid');
    grid.innerHTML = '';
    const filteredAvatars = activeCollection === 'ALL' ? avatarData : avatarData.filter(a => a.collection === activeCollection);

    const isMobile = window.innerWidth <= 768;

    filteredAvatars.forEach((avatar) => {
        const item = document.createElement('div');
        item.className = 'grid-item';
        item.onclick = () => {
            toggleGridView();
            loadAvatar(avatar);
        };

        if (isMobile) {
            const img = document.createElement('img');
            img.src = avatar.thumbnailUrl;
            img.alt = avatar.name;

            const nameDiv = document.createElement('div');
            nameDiv.className = 'grid-item-name-mobile';
            nameDiv.textContent = avatar.name;

            item.appendChild(img);
            item.appendChild(nameDiv);
        } else {
            const briefDesc = avatarBriefInfo[avatar.name] || "No description available.";
            const tags = [
                `Fit #${avatar.fitNo}`,
                avatar.collection.charAt(0).toUpperCase() + avatar.collection.slice(1),
                `Part ${avatar.id <= 7 ? '1' : avatar.id <= 17 ? '2' : '3'}`
            ];

            item.innerHTML = `
                <div class="grid-item-agent">
                    <div class="grid-item-agent-label">Agent</div>
                    <div class="grid-item-name">${avatar.name}</div>
                </div>

                <div class="grid-item-content">
                    <div class="grid-item-thumbnail-wrapper">
                        <img src="${avatar.thumbnailUrl}" alt="${avatar.name}">
                    </div>

                    <div class="grid-item-info">
                        <div class="grid-item-tags">
                            ${tags.map(tag => `<div class="grid-item-tag">${tag}</div>`).join('')}
                        </div>
                        <div class="grid-item-description">${briefDesc}</div>
                    </div>
                </div>
            `;
        }

        grid.appendChild(item);
    });
}

function toggleGridView() {
    isGridView = !isGridView;
    const gridContainer = document.getElementById('avatar-grid-container');
    const mainLayout = document.getElementById('main-layout');
    const toggleBtn = document.getElementById('grid-toggle-text-btn');
    const bottomSection = document.querySelector('.bottom-section');
    const mobileFooter = document.getElementById('mobile-footer');
    const isMobile = window.innerWidth <= 768;

    if (isGridView) {
        gridContainer.style.display = 'block';
        mainLayout.style.display = 'none';
        bottomSection.style.display = 'none';
        toggleBtn.textContent = "Viewer";

        if (isMobile && mobileFooter) {
            mobileFooter.classList.remove('viewer-mode');
        }
    } else {
        gridContainer.style.display = 'none';
        mainLayout.style.display = 'grid';
        bottomSection.style.display = 'flex';
        toggleBtn.textContent = "Grid View";

        if (mobileFooter) {
            mobileFooter.classList.add('viewer-mode');
        }
    }
}

function loadAvatar(avatar) {
    if (isModelLoading) return;
    if (!avatar) return;

    isModelLoading = true;
    activeAvatar = avatar;

    renderCircularCarousel();

    updateRightPanel(avatar);
    updateVideo(avatar);
    loadGLBModel(avatar.modelUrl);
}

function updateRightPanel(avatar) {
    const isMobile = window.innerWidth <= 768;

    document.getElementById('avatar-name-big').textContent = avatar.name;

    const rightNameEl = document.getElementById('avatar-name-big-right');
    if (rightNameEl) {
        rightNameEl.textContent = avatar.name;
    }

    const tagsContainer = document.getElementById('avatar-tags');
    tagsContainer.innerHTML = `
        <div class="tag">Fit #${avatar.fitNo}</div>
        <div class="tag">${avatar.collection.charAt(0).toUpperCase() + avatar.collection.slice(1)}</div>
        <div class="tag">Part ${avatar.id <= 7 ? '1' : avatar.id <= 17 ? '2' : '3'}</div>
    `;

    document.getElementById('brief-info').textContent = avatarBriefInfo[avatar.name] || "No description available.";

    const detailInfo = avatarDetailedInfo[avatar.name] || avatarDetailedInfo[Object.keys(avatarDetailedInfo).find(key => key.includes(avatar.name) || avatar.name.includes(key))];

    const detailBox = document.getElementById('detail-text-box');

    if (isMobile) {
        const briefDesc = avatarBriefInfo[avatar.name] || "No description available.";
        const tags = [
            `Fit #${avatar.fitNo}`,
            avatar.collection.charAt(0).toUpperCase() + avatar.collection.slice(1),
            `Part ${avatar.id <= 7 ? '1' : avatar.id <= 17 ? '2' : '3'}`
        ];

        let mobileContent = `
            <div class="avatar-tags-mobile">
                ${tags.map(tag => `<div class="tag-mobile">${tag}</div>`).join('')}
            </div>
            <div class="brief-info-mobile">${briefDesc}</div>
        `;

        if (detailInfo) {
            mobileContent += `
                <h3>Visual Design</h3>
                <p>${detailInfo.visual}</p>
                <h3>Sound Design</h3>
                <p>${detailInfo.sound}</p>
                <h3>Conceptual Depth</h3>
                <p>${detailInfo.concept}</p>
            `;
        } else {
            mobileContent += `
                <h3>Information</h3>
                <p>Runway Part: ${avatar.runwayPart}</p>
                <p>Fit Number: #${avatar.fitNo}</p>
                <p>Collection: ${avatar.collection}</p>
            `;
        }

        detailBox.innerHTML = mobileContent;
    } else {
        if (detailInfo) {
            detailBox.innerHTML = `
                <h3>Visual Design</h3>
                <p>${detailInfo.visual}</p>
                <h3>Sound Design</h3>
                <p>${detailInfo.sound}</p>
                <h3>Conceptual Depth</h3>
                <p>${detailInfo.concept}</p>
            `;
        } else {
            detailBox.innerHTML = `
                <h3>Information</h3>
                <p>Runway Part: ${avatar.runwayPart}</p>
                <p>Fit Number: #${avatar.fitNo}</p>
                <p>Collection: ${avatar.collection}</p>
            `;
        }
    }
}

function updateVideo(avatar) {
    const video = document.getElementById('main-video');
    video.src = avatar.videoUrl;
    video.load();
    video.play().catch(e => console.log('Video autoplay prevented:', e));
}

function loadGLBModel(modelUrl) {
    document.getElementById('loading-overlay').style.display = 'flex';
    document.getElementById('progress-bar').style.width = '0%';

    if (currentModel) {
        scene.remove(currentModel);
        currentModel = null;
    }

    const loader = new THREE.GLTFLoader();
    if (typeof MeshoptDecoder !== 'undefined') {
        loader.setMeshoptDecoder(MeshoptDecoder);
    }

    loader.load(
        modelUrl,
        (gltf) => {
            currentModel = gltf.scene;
            currentModel.scale.set(CONFIG.viewer.modelScale, CONFIG.viewer.modelScale, CONFIG.viewer.modelScale);
            scene.add(currentModel);

            if (gltf.animations && gltf.animations.length > 0) {
                mixer = new THREE.AnimationMixer(currentModel);
                gltf.animations.forEach(clip => {
                    mixer.clipAction(clip).play();
                });
            }

            document.getElementById('loading-overlay').style.display = 'none';
            isModelLoading = false;
        },
        (progress) => {
            const percent = Math.round((progress.loaded / progress.total) * 100);
            document.getElementById('progress-bar').style.width = `${percent}%`;
        },
        (error) => {
            console.error('Error loading model:', error);
            document.getElementById('loading-overlay').style.display = 'none';
            isModelLoading = false;
        }
    );
}

function setupEventListeners() {
    document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowLeft') navigateAvatar(-1);
        if (e.key === 'ArrowRight') navigateAvatar(1);
    });
    document.getElementById('grid-toggle-text-btn').addEventListener('click', toggleGridView);

    document.getElementById('carousel-prev').addEventListener('click', () => navigateAvatar(-1));
    document.getElementById('carousel-next').addEventListener('click', () => navigateAvatar(1));

    document.getElementById('avatar-carousel').addEventListener('wheel', (e) => {
        e.preventDefault();
        if (e.deltaY > 0) navigateAvatar(1);
        else navigateAvatar(-1);
    });
}

function navigateAvatar(direction) {
    if (!avatarData || avatarData.length === 0) return;

    const filteredAvatars = activeCollection === 'ALL' ? avatarData : avatarData.filter(a => a.collection === activeCollection);
    const currentIndex = filteredAvatars.indexOf(activeAvatar);
    let newIndex = currentIndex + direction;

    if (newIndex < 0) newIndex = filteredAvatars.length - 1;
    if (newIndex >= filteredAvatars.length) newIndex = 0;

    loadAvatar(filteredAvatars[newIndex]);
}

let viewerIsFullscreen = false;
let viewerDragOffset = { x: 0, y: 0 };
let currentViewerType = null;

function openViewer(type) {
    const popup = document.getElementById('viewer-popup');
    const data = viewerData[type];
    if (!data) return;

    currentViewerType = type;
    popup.classList.add('active');

    document.getElementById('viewer-title').textContent = data.title;
    document.getElementById('viewer-description').textContent = data.description || 'No description available.';

    if (!viewerIsFullscreen) {
        const marginX = window.innerWidth * 0.2;
        const marginY = window.innerHeight * 0.2;
        const availableWidth = window.innerWidth - (2 * marginX) - 600;
        const availableHeight = window.innerHeight - (2 * marginY) - 500;

        const randomX = marginX + (Math.random() * availableWidth);
        const randomY = marginY + (Math.random() * availableHeight);

        popup.style.left = randomX + 'px';
        popup.style.top = randomY + 'px';
        popup.style.width = '600px';
        popup.style.height = '500px';
    }

    renderViewerContent(type);
}

function closeViewer() {
    const popup = document.getElementById('viewer-popup');
    const display = document.getElementById('viewer-display');

    const videos = display.querySelectorAll('video');
    videos.forEach(video => {
        video.pause();
        video.currentTime = 0;
        video.src = '';
    });

    const iframes = display.querySelectorAll('iframe');
    iframes.forEach(iframe => {
        iframe.src = 'about:blank';
    });

    display.innerHTML = '';

    popup.classList.remove('active');
    viewerIsFullscreen = false;
    popup.classList.remove('fullscreen');
    currentViewerType = null;

    const fullscreenBtn = document.getElementById('viewer-fullscreen');
    fullscreenBtn.innerHTML = '<i class="fas fa-expand"></i>';
}

function toggleViewerFullscreen() {
    const popup = document.getElementById('viewer-popup');
    const fullscreenBtn = document.getElementById('viewer-fullscreen');

    viewerIsFullscreen = !viewerIsFullscreen;

    if (viewerIsFullscreen) {
        popup.classList.add('fullscreen');
        fullscreenBtn.innerHTML = '<i class="fas fa-compress"></i>';
    } else {
        popup.classList.remove('fullscreen');
        fullscreenBtn.innerHTML = '<i class="fas fa-expand"></i>';
    }
}

function openViewerInNewTab() {
    if (!currentViewerType) return;

    const data = viewerData[currentViewerType];
    if (!data) return;

    if (data.newTabUrl) {
        window.open(data.newTabUrl, '_blank', 'noopener,noreferrer');
    }
}

function renderViewerContent(type) {
    const display = document.getElementById('viewer-display');
    display.innerHTML = '';

    const data = viewerData[type];
    if (!data) return;

    let contentHTML = '';

    switch (data.type) {
        case 'image':
            contentHTML = `<img src="${data.url}" alt="Image">`;
            break;

        case 'video':
            if (data.url.includes('youtube.com') || data.url.includes('youtu.be')) {
                contentHTML = `<iframe src="${data.url}" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe>`;
            } else {
                contentHTML = `<video controls autoplay playsinline><source src="${data.url}" type="video/mp4"></video>`;
            }
            break;

        case 'web':
            contentHTML = `<iframe src="${data.url}" sandbox="allow-scripts allow-same-origin allow-popups" referrerpolicy="no-referrer"></iframe>`;
            break;

        case 'html':
            const blob = new Blob([data.content], { type: 'text/html' });
            const blobURL = URL.createObjectURL(blob);
            contentHTML = `<iframe src="${blobURL}"></iframe>`;
            break;

        default:
            contentHTML = '<p style="color: #9A9488; font-family: Inter, sans-serif;">Unsupported Format</p>';
    }

    display.innerHTML = contentHTML;
}

// Viewer Drag
function initViewerDrag() {
    const popup = document.getElementById('viewer-popup');
    const titlebar = document.getElementById('viewer-titlebar');

    let isDragging = false;

    titlebar.addEventListener('mousedown', (e) => {
        if (viewerIsFullscreen) return;
        isDragging = true;

        const rect = popup.getBoundingClientRect();
        viewerDragOffset.x = e.clientX - rect.left;
        viewerDragOffset.y = e.clientY - rect.top;

        titlebar.style.cursor = 'grabbing';
    });

    document.addEventListener('mousemove', (e) => {
        if (!isDragging || viewerIsFullscreen) return;

        const x = e.clientX - viewerDragOffset.x;
        const y = e.clientY - viewerDragOffset.y;

        popup.style.left = x + 'px';
        popup.style.top = y + 'px';
    });

    document.addEventListener('mouseup', () => {
        isDragging = false;
        titlebar.style.cursor = 'move';
    });
}

document.getElementById('viewer-fullscreen').addEventListener('click', toggleViewerFullscreen);
document.getElementById('viewer-newtab').addEventListener('click', openViewerInNewTab);
