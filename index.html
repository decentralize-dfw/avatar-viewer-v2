<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>C2W2 INDUSTRIAL STUDIO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&family=Share+Tech+Mono&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
/* --- RESET & FONTS --- */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Share Tech Mono", "Rajdhani", monospace;
}

body {
    background-color: #050505;
    overflow: hidden;
    color: #fff;
    font-size: 11px;
}

/* --- CUSTOM SCROLLBAR (Industrial Look) --- */
::-webkit-scrollbar {
    width: 6px;
    height: 6px;
}
::-webkit-scrollbar-track {
    background: #0a0a0a; 
    border-left: 1px solid #222;
}
::-webkit-scrollbar-thumb {
    background: #444; 
    border: 1px solid #000;
}
::-webkit-scrollbar-thumb:hover {
    background: #fff; 
}

/* --- GLOBAL FULLSCREEN GRID BACKGROUND (ARKAPLAN) --- */
.global-grid-background {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 0;
    pointer-events: none;
    background-color: #000;
    background-image:
        linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
    background-size: 40px 40px;
}

/* --- GLOBAL TOP OVERLAY GRID (TÜM SAYFA ÜSTÜNE) --- */
.global-overlay-grid {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 9999; /* En üstte */
    pointer-events: none; /* Tıklamayı engelleme */
    background-image: 
        linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
    background-size: 4px 4px; /* Çok sıkı mikro grid */
    opacity: 0.5;
}

.container {
    display: flex;
    flex-direction: column;
    height: 100vh;
    width: 100vw;
    position: relative;
    z-index: 1;
}

/* --- TOP HEADER --- */
.top-section {
    height: 45px;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    background-color: rgba(0, 0, 0, 0.95);
    z-index: 10;
    border-bottom: 1px solid rgba(255, 255, 255, 0.2);
}

.title {
    font-size: 14px;
    color: #fff;
    font-family: "Orbitron", sans-serif;
    font-weight: 900;
    letter-spacing: 2px;
    text-transform: uppercase;
    width: 300px;
}

/* ORTA: GRID TOGGLE BUTTON */
.center-menu {
    flex: 1;
    display: flex;
    justify-content: center;
}

.grid-toggle-text-btn {
    background: transparent;
    border: 1px solid rgba(255, 255, 255, 0.4);
    color: #fff; /* Beyaz yapıldı */
    font-family: "Orbitron", sans-serif;
    font-size: 11px;
    padding: 5px 15px;
    cursor: pointer;
    letter-spacing: 2px;
    transition: all 0.3s ease;
    text-transform: uppercase;
}
.grid-toggle-text-btn:hover {
    background: rgba(255, 255, 255, 0.15);
    border-color: #fff;
}

/* SAĞ: COLLECTIONS */
.collections {
    display: flex;
    gap: 5px;
    width: 300px;
    justify-content: flex-end;
}

.collection-btn {
    padding: 4px 10px;
    border: 1px solid rgba(255, 255, 255, 0.3);
    background-color: rgba(0, 0, 0, 0.5);
    cursor: pointer;
    font-size: 10px;
    color: #fff;
    text-transform: uppercase;
    font-family: "Share Tech Mono", monospace;
    transition: all 0.2s;
}

.collection-btn:hover { background-color: rgba(255, 255, 255, 0.1); }
.collection-btn.active { background-color: #fff; border-color: #fff; color: #000; }

/* --- MAIN LAYOUT GRID --- */
.main-layout {
    display: grid;
    grid-template-columns: 25vw 1fr 350px;
    height: calc(100vh - 125px);
    position: relative;
    z-index: 1;
    padding-top: 0;
}

/* --- LEFT: VIDEO & INFO SECTION (GÜNCELLENDİ) --- */
.left-video-section {
    background: rgba(0, 0, 0, 0.85);
    border-right: 1px solid rgba(255, 255, 255, 0.2);
    display: flex;
    flex-direction: column;
    position: relative;
    height: 100%;
    overflow: hidden;
}

/* Başlık alanı - Videonun üzerine alındı */
.video-header {
    padding: 15px 0 10px 0;
    text-align: center;
}

.video-label {
    /* Artık absolute değil, akışın içinde */
    position: static; 
    font-size: 10px;
    color: #fff;
    background: transparent;
    padding: 0;
    border: none;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-family: "Orbitron", sans-serif;
    font-weight: bold;
    display: inline-block;
    border-bottom: 2px solid rgba(255, 255, 255, 0.5);
}

/* Video Wrapper (GÜNCELLENDİ: 9:16 ve Sabit Oran) */
.video-wrapper {
    position: relative;
    /* Genişliği biraz daralttık, %70 */
    width: 70%;
    margin: 0 auto 15px auto; /* Ortala ve alttan boşluk ver */
    
    /* 9:16 Oranını ZORLA */
    aspect-ratio: 9/16; 
    
    overflow: hidden;
    border: 1px solid rgba(255, 255, 255, 0.2);
    box-shadow: 0 0 15px rgba(0,0,0,0.5);
    /* Flex container içinde büyümemesi için */
    flex-shrink: 0;
}

/* 1. ANA VİDEO */
#main-video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: grayscale(1) contrast(1.2) brightness(0.9); /* Tamamen siyah beyaz */
}

/* 2. PIXEL FX CANVAS (VİDEO İÇİN) */
#video-pixel-fx {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 2;
    opacity: 0.4;
    mix-blend-mode: hard-light;
    
    image-rendering: pixelated;
    image-rendering: crisp-edges;
}

/* Sol Panel Bilgi Alanı - GÜNCELLENDİ */
.left-info-content {
    padding: 0 20px 10px 20px;
    display: flex;
    flex-direction: column;
    gap: 15px;
    overflow-y: auto; 
    
    /* BU KISIM ÖNEMLİ: Kalan alanı doldur */
    flex: 1; 
    min-height: 0; /* Flexbox içinde scroll çalışması için */
}

.avatar-name-section { display: flex; flex-direction: column; gap: 5px; }

.avatar-name-big {
    font-size: 22px;
    font-weight: 900;
    letter-spacing: 1px;
    color: #fff;
    line-height: 1;
    text-transform: uppercase;
    font-family: 'Orbitron', monospace;
}

.avatar-tags { display: flex; flex-wrap: wrap; gap: 5px; }

.tag {
    border: 1px solid rgba(255, 255, 255, 0.3);
    padding: 4px 8px;
    font-size: 10px;
    color: #fff;
    text-transform: uppercase;
    font-weight: 700;
    background: rgba(255,255,255,0.05);
}

.brief-info {
    font-size: 11px;
    line-height: 1.5;
    color: #ccc;
    border-left: 2px solid #fff; 
    padding-left: 10px;
    margin-top: 5px;
}

/* Tech Icons Section - GÜNCELLENDİ */
.tech-icons-section {
    padding: 10px;
    display: flex; /* Grid yerine Flex */
    justify-content: center; /* Ortala */
    gap: 10px;
    border-top: 1px solid rgba(255, 255, 255, 0.1);
    background: rgba(0,0,0,0.3);
    
    /* Sabit kalması için */
    flex-shrink: 0; 
    /* margin-top: auto; Flex:1 sayesinde zaten altta kalır ama garanti olsun */
    margin-top: auto; 
}

/* Tech Icon - GÜNCELLENDİ */
.tech-icon {
    width: 30px; /* Sabit Genişlik */
    height: 30px; /* Sabit Yükseklik */
    border: 1px solid rgba(255, 255, 255, 0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px; /* Küçük ikon */
    color: rgba(255, 255, 255, 0.5);
    transition: 0.3s;
}
.tech-icon:hover { color: #fff; border-color: #fff; background: rgba(255,255,255,0.1); }

/* --- CENTER: GLB VIEWER --- */
.center-viewer-section {
    position: relative;
    overflow: hidden;
}

.viewer-container {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 1;
}

/* CANVAS AYARLARI */
#viewer-canvas {
    width: 100%; height: 100%;
    position: absolute; top: 0; left: 0;
    z-index: 1;
    filter: brightness(1.2) contrast(1.1) grayscale(0.2); /* Hafif solukluk */
}

#pixel-canvas {
    width: 100%; height: 100%;
    position: absolute; top: 0; left: 0;
    z-index: 2;
    pointer-events: none;
    opacity: 0.8; 
    image-rendering: pixelated; 
    image-rendering: crisp-edges;
    filter: contrast(1.5) saturate(0); /* Siyah beyaz */ 
    mix-blend-mode: hard-light;
}

.viewer-container::after {
    content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(circle at center, transparent 30%, rgba(0, 0, 0, 0.6) 100%);
    pointer-events: none; z-index: 3;
}

/* --- RIGHT: INFO PANEL --- */
.right-info-panel {
    background: rgba(0, 0, 0, 0.9);
    border-left: 1px solid rgba(255, 255, 255, 0.2);
    padding: 25px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 20px;
}

/* Hide name section in right panel on desktop */
.right-info-panel .avatar-name-section {
    display: none;
}

.detail-text-box { padding: 0; background: transparent; }

.detail-text-box h3 {
    font-size: 11px;
    color: #fff; /* Beyaz */
    text-transform: uppercase;
    margin-bottom: 8px;
    margin-top: 20px;
    letter-spacing: 1px;
    font-family: "Orbitron", sans-serif;
    font-weight: 700;
    border-bottom: 1px solid rgba(255,255,255,0.2);
    padding-bottom: 3px;
    display: inline-block;
}
.detail-text-box h3:first-child { margin-top: 0; }

.detail-text-box p {
    font-size: 11px;
    line-height: 1.6;
    color: #bbb;
    margin-bottom: 10px;
}

/* --- EFEKTLER (Ortak) --- */
.scan-effect {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(0deg, rgba(0,0,0,0.1) 0px, rgba(0,0,0,0.1) 1px, transparent 1px, transparent 3px);
    pointer-events: none; z-index: 5; opacity: 0.3;
}
.pixel-grid-overlay {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 6; opacity: 0.3; 
    background-size: 3px 3px;
    background-image: linear-gradient(to right, rgba(255,255,255,0.1) 1px, transparent 1px), linear-gradient(to bottom, rgba(255,255,255,0.1) 1px, transparent 1px);
}
.wireframe-overlay {
    position: absolute; top: 20px; left: 20px; right: 20px; bottom: 20px; border: 1px solid rgba(255,255,255,0.3); pointer-events: none; z-index: 7;
}
.corner-bracket {
    position: absolute; width: 15px; height: 15px; border: 2px solid rgba(255,255,255,0.9); pointer-events: none;
}
.corner-bracket.top-left { top: -1px; left: -1px; border-right: none; border-bottom: none; }
.corner-bracket.top-right { top: -1px; right: -1px; border-left: none; border-bottom: none; }
.corner-bracket.bottom-left { bottom: -1px; left: -1px; border-right: none; border-top: none; }
.corner-bracket.bottom-right { bottom: -1px; right: -1px; border-left: none; border-top: none; }
.crosshair-overlay {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 30px; height: 30px; pointer-events: none; z-index: 7;
}
.crosshair-overlay::before, .crosshair-overlay::after { content: ''; position: absolute; background: rgba(255,255,255,0.6); }
.crosshair-overlay::before { top: 14px; left: 0; width: 30px; height: 2px; }
.crosshair-overlay::after { left: 14px; top: 0; width: 2px; height: 30px; }

/* --- BOTTOM & CAROUSEL --- */
.bottom-section {
    position: fixed; left: 0; right: 0; bottom: 0; height: 80px; z-index: 5;
    background: rgba(0, 0, 0, 0.95); 
    border-top: 1px solid rgba(255, 255, 255, 0.2);
    transition: transform 0.3s ease;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 0 20px;
}

.avatar-carousel { 
    display: flex; 
    justify-content: center; /* Ortada topla */
    align-items: center; 
    flex: 1; /* Alabildiği kadar alan al */
    height: 100%; 
    gap: 15px; 
    padding: 10px; 
    overflow: hidden; /* Scrollbar'ı GİZLE */
    position: relative;
}

/* Navigasyon Okları */
.carousel-nav {
    width: 40px;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 18px;
    color: rgba(255, 255, 255, 0.5);
    transition: 0.2s;
    z-index: 10;
}
.carousel-nav:hover { color: #fff; background: rgba(255,255,255,0.05); }

.avatar-item { 
    width: 50px; 
    height: 50px; 
    cursor: pointer; 
    opacity: 0.3; 
    border: 1px solid transparent; 
    transition: all 0.3s ease; 
    flex-shrink: 0;
    
    /* Tam kare */
    aspect-ratio: 1/1;
    background: #000; /* Boşluklar siyah olsun */
}

.avatar-item:hover { opacity: 0.8; transform: scale(1.1); }

.avatar-item.active { 
    opacity: 1; 
    border-color: #fff; 
    transform: scale(1.3); /* Aktif olanı büyüt */
    box-shadow: 0 0 15px rgba(255, 255, 255, 0.2); 
    z-index: 5;
}

.avatar-thumbnail {
    width: 100%;
    height: 100%;
    object-fit: contain; /* ASLA KESİLMEZ (CROP OLMAZ) */
    filter: grayscale(0.8) brightness(0.9) contrast(1.1);
    image-rendering: pixelated;
    image-rendering: -moz-crisp-edges;
    image-rendering: crisp-edges;
}

.avatar-item.active .avatar-thumbnail {
    filter: grayscale(0.3) brightness(1.1) contrast(1.2);
}

/* --- LOADING & GRID VIEW --- */
.loading-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
.loading-text { font-size: 12px; margin-bottom: 10px; letter-spacing: 3px; }
.loading-progress { width: 150px; height: 2px; background: rgba(255,255,255,0.2); }
.progress-bar { height: 100%; background: #fff; width: 0%; transition: width 0.1s; } /* Beyaz */

/* GRID CONTAINER DÜZENLEMESİ: Bottom 0 yapıldı */
.avatar-grid-container {
    position: absolute;
    top: 45px;
    left: 0;
    right: 0;
    bottom: 0;
    padding: 30px;
    overflow-y: auto;
    z-index: 100;
    background-color: rgba(5, 5, 5, 0.98);
    display: none;
}

/* BLADE RUNNER ID CARD GRID */
.avatar-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 25px;
    max-width: 1800px;
    margin: 0 auto;
}

/* KEYFRAMES: Animated Noise */
@keyframes gridNoise {
    0% { opacity: 0.3; transform: translateY(0); }
    25% { opacity: 0.5; transform: translateY(-2px); }
    50% { opacity: 0.4; transform: translateY(2px); }
    75% { opacity: 0.6; transform: translateY(-1px); }
    100% { opacity: 0.3; transform: translateY(0); }
}

/* ID CARD KÜNYE */
.grid-item {
    background: rgba(10, 10, 10, 0.9);
    border: 1px solid rgba(255, 255, 255, 0.2);
    padding: 0;
    cursor: pointer;
    position: relative;
    display: flex;
    flex-direction: column;
    transition: all 0.3s ease;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.8);
    overflow: hidden;
    opacity: 0.6; /* Default dark */
}

.grid-item:hover {
    opacity: 1 !important; /* Parlat */
    border-color: rgba(255, 255, 255, 0.6);
    box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
    transform: translateY(-4px);
}

/* C2W2 HEADER */
.grid-item-header {
    background: #000;
    padding: 8px 12px;
    border-bottom: 2px solid rgba(255, 255, 255, 0.4);
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.grid-item-lapd {
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    color: #fff;
    letter-spacing: 2px;
}

.grid-item-signal {
    font-family: 'Share Tech Mono', monospace;
    font-size: 7px;
    color: rgba(255, 255, 255, 0.5);
    letter-spacing: 1px;
}

/* AGENT NAME */
.grid-item-agent {
    background: rgba(0, 0, 0, 0.8);
    padding: 6px 12px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.2);
}

.grid-item-agent-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 7px;
    color: rgba(255, 255, 255, 0.6);
    letter-spacing: 1px;
    margin-bottom: 2px;
}

.grid-item-name {
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    color: #fff;
    letter-spacing: 1px;
    line-height: 1.4;
    text-transform: uppercase;
}

/* MAIN CONTENT AREA */
.grid-item-content {
    display: flex;
    padding: 15px;
    gap: 15px;
    flex: 1;
}

/* THUMBNAIL WITH FILTER */
.grid-item-thumbnail-wrapper {
    width: 140px;
    height: 180px;
    flex-shrink: 0;
    position: relative;
    border: 2px solid rgba(255, 255, 255, 0.2);
    background: #000;
    overflow: hidden;
}

.grid-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: brightness(0.5) contrast(0.4) saturate(0);
    image-rendering: pixelated;
    transition: 0.3s;
}

.grid-item:hover img {
    filter: brightness(1.1) contrast(1.2) saturate(0.9);
}

/* Animated Noise Overlay */
.grid-item-thumbnail-wrapper::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-image:
        repeating-linear-gradient(
            0deg,
            rgba(255, 255, 255, 0.08) 0px,
            transparent 1px,
            transparent 2px,
            rgba(255, 255, 255, 0.08) 3px
        ),
        repeating-linear-gradient(
            90deg,
            rgba(255, 255, 255, 0.08) 0px,
            transparent 1px,
            transparent 2px,
            rgba(255, 255, 255, 0.08) 3px
        );
    pointer-events: none;
    animation: gridNoise 1.5s ease-in-out infinite;
}

/* INFO SECTION (Right side) */
.grid-item-info {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

/* TAGS */
.grid-item-tags {
    display: flex;
    flex-direction: column;
    gap: 4px;
}

.grid-item-tag {
    font-family: 'Share Tech Mono', monospace;
    font-size: 8px;
    color: #fff;
    letter-spacing: 1px;
    padding: 3px 0;
    border-left: 2px solid #fff;
    padding-left: 8px;
}

/* DESCRIPTION */
.grid-item-description {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px; /* Büyütüldü 7px -> 10px */
    line-height: 1.6;
    color: rgba(255, 255, 255, 0.8);
    flex: 1;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 6;
    -webkit-box-orient: vertical;
}

/* FOOTER */
.grid-item-footer {
    background: #000;
    padding: 8px 12px;
    border-top: 2px solid rgba(255, 255, 255, 0.4);
    text-align: center;
}

.grid-item-footer-text {
    font-family: 'Press Start 2P', monospace;
    font-size: 6px;
    color: #fff;
    letter-spacing: 2px;
}

/* RESPONSIVE: Ekran daralınca kart boyutu ve adet ayarla */
@media (max-width: 1800px) {
    .avatar-grid { grid-template-columns: repeat(4, 1fr); }
}

@media (max-width: 1400px) {
    .avatar-grid { grid-template-columns: repeat(3, 1fr); }
}

@media (max-width: 1000px) {
    .avatar-grid { grid-template-columns: repeat(2, 1fr); gap: 20px; }
    .grid-item-thumbnail-wrapper { width: 120px; height: 160px; }
}

@media (max-width: 700px) {
    .avatar-grid { grid-template-columns: 1fr; }
    .avatar-grid-container { padding: 15px; }
}

/* MOBILE RESPONSIVE (768px ve altı) */
@media (max-width: 768px) {
    /* Hide collections filter */
    .collections {
        display: none !important;
    }

    /* Top bar simplified */
    .top-section {
        height: 40px;
        padding: 0 10px;
        justify-content: flex-start;
        gap: 10px;
        flex-wrap: nowrap;
        overflow: hidden;
    }

    .title {
        display: none;
    }

    .center-menu {
        flex: 0;
        justify-content: flex-start;
    }

    .grid-toggle-text-btn {
        font-size: 8px;
        padding: 3px 8px;
        letter-spacing: 0.5px;
        white-space: nowrap;
    }

    /* Main layout: Single column stack */
    .main-layout {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr auto;
        height: calc(100vh - 120px);
        padding: 0;
    }

    /* GLB Viewer: Square on top */
    .center-viewer-section {
        order: 1;
        aspect-ratio: 1/1;
        width: 100%;
        max-height: 50vh;
    }

    /* C2W2 overlay on mobile */
    .center-viewer-section::after {
        content: 'C2W2';
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-family: 'Press Start 2P', monospace;
        font-size: 24px;

    <script>
// --- DATA VARIABLES ---
let avatarBriefInfo = {};
let avatarDetailedInfo = {};
let avatarData = []; 

const CONFIG = {
    viewer: {
        modelScale: 0.8,
        camera: { position: { x: 0, y: 1.2, z: 3 }, target: { x: 0, y: 0.8, z: 0 } },
        pixelFactor: 0.1 // ORTAK PİKSEL ORANI (Hem 3D hem Video için)
    }
};

let scene, camera, renderer, pixelRenderer, controls, clock = new THREE.Clock();
let mixer = null, currentModel = null;
let activeAvatar = null, collections = [], activeCollection = "ALL";
let isModelLoading = false, isGridView = false;

// VIDEO PIXEL FX VARIABLES
let videoPixelCanvas, videoPixelCtx, mainVideoEl;

const hdriPaths = ['https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/equirectangular/venice_sunset_1k.hdr'];

document.addEventListener('DOMContentLoaded', () => {
    initMeshoptDecoder();
    initApp();
});

function initMeshoptDecoder() {
    if (typeof MeshoptDecoder === 'undefined') return;
    THREE.GLTFLoader.prototype.setMeshoptDecoder = function(decoder) {
        this.meshoptDecoder = decoder;
        return this;
    };
}

// 1. DATA FETCHING (Brief Info)
async function loadExternalBriefInfo() {
    try {
        const response = await fetch('https://raw.githubusercontent.com/decentralize-dfw/avatar-viewer-v2/refs/heads/main/avatarBriefInfo.txt');
        if (!response.ok) throw new Error("Network response was not ok");
        const text = await response.text();
        const cleanText = text.replace(/const\s+avatarBriefInfo\s*=\s*/, '').trim().replace(/;$/, '');
        avatarBriefInfo = new Function(`return ${cleanText}`)();
    } catch (error) {
        console.warn("Brief info could not be loaded/parsed.", error);
    }
}

// 2. DATA FETCHING (Detaylı Bilgi)
async function loadExternalDetailedInfo() {
    try {
        const response = await fetch('https://raw.githubusercontent.com/decentralize-dfw/avatar-viewer-v2/refs/heads/main/avatarDetailedInfo.txt');
        if (!response.ok) throw new Error("Network response was not ok");
        const text = await response.text();
        const cleanText = text.replace(/const\s+avatarDetailedInfo\s*=\s*/, '').trim().replace(/;$/, '');
        avatarDetailedInfo = new Function(`return ${cleanText}`)();
    } catch (error) {
        console.warn("Detailed info could not be loaded/parsed.", error);
    }
}

// 3. DATA FETCHING (Avatar Listesi)
async function loadExternalAvatarData() {
    try {
        const response = await fetch('https://raw.githubusercontent.com/decentralize-dfw/avatar-viewer-v2/refs/heads/main/avatarfiles.txt');
        if (!response.ok) throw new Error("Network response was not ok");
        const text = await response.text();
        
        let cleanText = text.trim();
        if (cleanText.startsWith('const')) {
             cleanText = cleanText.replace(/const\s+avatarData\s*=\s*/, '').trim().replace(/;$/, '');
        }
        
        avatarData = new Function(`return ${cleanText}`)();
    } catch (error) {
        console.error("Avatar data could not be loaded.", error);
        avatarData = []; 
    }
}

async function initApp() {
    initScene();
    initVideoPixelFx();
    
    await Promise.all([loadExternalBriefInfo(), loadExternalDetailedInfo(), loadExternalAvatarData()]);
    
    setupAvatarSystem(); 
    setupEventListeners();
    document.getElementById('loading-overlay').style.display = 'none';
}

function setupAvatarSystem() {
    if (!avatarData || avatarData.length === 0) return;

    collections = [...new Set(avatarData.map(avatar => avatar.collection))];
    populateCollectionButtons();
    
    // Grid'i doldur
    populateAvatarGrid();

    // İlk avatarı yükle
    loadAvatar(avatarData[0]);
}

function initVideoPixelFx() {
    mainVideoEl = document.getElementById('main-video');
    videoPixelCanvas = document.getElementById('video-pixel-fx');
    videoPixelCtx = videoPixelCanvas.getContext('2d');
    
    // Piksellerin yumuşamasını engelle
    videoPixelCtx.imageSmoothingEnabled = false;
    videoPixelCtx.mozImageSmoothingEnabled = false;
    videoPixelCtx.webkitImageSmoothingEnabled = false;
    videoPixelCtx.msImageSmoothingEnabled = false;
}

function updateVideoPixelFx() {
    if (!mainVideoEl || mainVideoEl.paused || mainVideoEl.ended) return;
    
    const rect = videoPixelCanvas.getBoundingClientRect();
    // GLB Viewer ile aynı piksel oranını kullan
    const pixelRatio = CONFIG.viewer.pixelFactor;
    
    const lowResW = Math.floor(rect.width * pixelRatio);
    const lowResH = Math.floor(rect.height * pixelRatio);
    
    if (lowResW > 0 && lowResH > 0) {
        videoPixelCanvas.width = lowResW;
        videoPixelCanvas.height = lowResH;
        videoPixelCtx.drawImage(mainVideoEl, 0, 0, lowResW, lowResH);
    }
}

function initScene() {
    scene = new THREE.Scene();
    scene.background = null;

    const canvasContainer = document.querySelector('.viewer-container');
    const aspect = canvasContainer.clientWidth / canvasContainer.clientHeight;
    camera = new THREE.PerspectiveCamera(50, aspect, 0.01, 1000);
    camera.position.set(CONFIG.viewer.camera.position.x, CONFIG.viewer.camera.position.y, CONFIG.viewer.camera.position.z);

    renderer = new THREE.WebGLRenderer({
        canvas: document.getElementById('viewer-canvas'),
        antialias: true,
        alpha: true, 
        powerPreference: 'high-performance'
    });
    renderer.setPixelRatio(window.devicePixelRatio); 
    renderer.setSize(canvasContainer.clientWidth, canvasContainer.clientHeight);
    renderer.outputEncoding = THREE.sRGBEncoding;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.physicallyCorrectLights = true;

    pixelRenderer = new THREE.WebGLRenderer({
        canvas: document.getElementById('pixel-canvas'),
        antialias: false,
        alpha: true
    });
    pixelRenderer.setPixelRatio(1);
    pixelRenderer.setSize(
        canvasContainer.clientWidth * CONFIG.viewer.pixelFactor, 
        canvasContainer.clientHeight * CONFIG.viewer.pixelFactor, 
        false
    );
    pixelRenderer.outputEncoding = THREE.sRGBEncoding;

    controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.minDistance = 1.5;
    controls.maxDistance = 6;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 1.0;
    controls.target.set(CONFIG.viewer.camera.target.x, CONFIG.viewer.camera.target.y, CONFIG.viewer.camera.target.z);
    controls.update();

    window.addEventListener('resize', onWindowResize);

    const rgbeLoader = new THREE.RGBELoader();
    rgbeLoader.load(hdriPaths[0], function(texture) {
        texture.mapping = THREE.EquirectangularReflectionMapping;
        scene.environment = texture;
    });

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);
    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(5, 10, 7.5);
    scene.add(directionalLight);

    animate();
}

function animate() {
    requestAnimationFrame(animate);
    if (mixer) mixer.update(clock.getDelta());
    controls.update();
    
    renderer.render(scene, camera);
    pixelRenderer.render(scene, camera);
    
    updateVideoPixelFx();
}

function onWindowResize() {
    const canvasContainer = document.querySelector('.viewer-container');
    camera.aspect = canvasContainer.clientWidth / canvasContainer.clientHeight;
    camera.updateProjectionMatrix();

    renderer.setSize(canvasContainer.clientWidth, canvasContainer.clientHeight);

    pixelRenderer.setSize(
        canvasContainer.clientWidth * CONFIG.viewer.pixelFactor,
        canvasContainer.clientHeight * CONFIG.viewer.pixelFactor,
        false
    );

    // Carousel'ı ekran boyutuna göre güncelle
    renderCircularCarousel();

    // Grid'i yeniden render et (mobile/desktop geçişlerinde)
    if (isGridView) {
        populateAvatarGrid();
    }
}

function populateCollectionButtons() {
    const collectionsContainer = document.getElementById('collections');
    collectionsContainer.innerHTML = ''; 
    const allBtn = document.createElement('button');
    allBtn.className = 'collection-btn active';
    allBtn.textContent = 'ALL';
    allBtn.onclick = () => filterCollection('ALL');
    collectionsContainer.appendChild(allBtn);

    collections.forEach(collection => {
        const btn = document.createElement('button');
        btn.className = 'collection-btn';
        btn.textContent = collection.toUpperCase();
        btn.onclick = () => filterCollection(collection);
        collectionsContainer.appendChild(btn);
    });
}

function filterCollection(collection) {
    activeCollection = collection;
    document.querySelectorAll('.collection-btn').forEach(btn => {
        btn.classList.toggle('active', btn.textContent === collection || (collection === 'ALL' && btn.textContent === 'ALL'));
    });
    // Koleksiyon değişince grid güncellenir, ama carousel sadece loadAvatar çağrıldığında güncellenir
    // Burada aktif avatarı da değiştirmek mantıklı olabilir, listedeki ilk elemana geçelim
    const filtered = activeCollection === 'ALL' ? avatarData : avatarData.filter(a => a.collection === activeCollection);
    if(filtered.length > 0) {
        loadAvatar(filtered[0]);
    }
    populateAvatarGrid();
}

/* --- YENİ DÖNGÜSEL CAROUSEL MANTIĞI --- */
function renderCircularCarousel() {
    if (!activeAvatar) return;
    
    const filteredAvatars = activeCollection === 'ALL' ? avatarData : avatarData.filter(a => a.collection === activeCollection);
    const currentIndex = filteredAvatars.indexOf(activeAvatar);
    const carouselContainer = document.getElementById('avatar-carousel');
    
    carouselContainer.innerHTML = ''; // Temizle
    
    // DİNAMİK HESAPLAMA: Ekran genişliğine göre sığacak sayı
    const containerWidth = carouselContainer.clientWidth || window.innerWidth;
    const itemFullWidth = 65; // 50px width + 15px gap
    let totalVisible = Math.floor(containerWidth / itemFullWidth);
    
    // Her zaman tek sayı olsun ki ortalayabilelim
    if (totalVisible % 2 === 0) totalVisible--; 
    
    // Çok az olmasın (en az 7)
    if (totalVisible < 7) totalVisible = 7;

    const offset = Math.floor(totalVisible / 2); 
    
    for (let i = -offset; i <= offset; i++) {
        // Döngüsel indeks hesaplama (negatifleri de kapsar)
        let targetIndex = (currentIndex + i) % filteredAvatars.length;
        if (targetIndex < 0) targetIndex += filteredAvatars.length;
        
        const avatar = filteredAvatars[targetIndex];
        
        const item = document.createElement('div');
        // Ortadaki eleman aktif olur
        item.className = 'avatar-item' + (i === 0 ? ' active' : '');
        
        // Tıklayınca o avatara git
        item.onclick = () => {
            loadAvatar(avatar);
        };
        
        const img = document.createElement('img');
        img.className = 'avatar-thumbnail';
        img.src = avatar.thumbnailUrl;
        img.alt = avatar.name;
        
        item.appendChild(img);
        carouselContainer.appendChild(item);
    }
}

function populateAvatarGrid() {
    const grid = document.getElementById('avatar-grid');
    grid.innerHTML = '';
    const filteredAvatars = activeCollection === 'ALL' ? avatarData : avatarData.filter(a => a.collection === activeCollection);

    const isMobile = window.innerWidth <= 768;

    filteredAvatars.forEach((avatar) => {
        const item = document.createElement('div');
        item.className = 'grid-item';
        item.onclick = () => {
            toggleGridView();
            loadAvatar(avatar);
        };

        if (isMobile) {
            // Mobile: image only
            const img = document.createElement('img');
            img.src = avatar.thumbnailUrl;
            img.alt = avatar.name;
            img.style.width = '100%';
            img.style.height = '100%';
            img.style.objectFit = 'cover';
            img.style.filter = 'brightness(0.5) contrast(0.4) saturate(0)';
            img.style.transition = '0.3s';

            item.appendChild(img);

            item.onmouseenter = () => {
                img.style.filter = 'brightness(1.1) contrast(1.2) saturate(0.9)';
            };
            item.onmouseleave = () => {
                img.style.filter = 'brightness(0.5) contrast(0.4) saturate(0)';
            };
        } else {
            // Desktop: full card
            const briefDesc = avatarBriefInfo[avatar.name] || "No description available.";
            const tags = [
                `FIT #${avatar.fitNo}`,
                avatar.collection.toUpperCase(),
                `PART ${avatar.id <= 7 ? '1' : avatar.id <= 17 ? '2' : '3'}`
            ];

            item.innerHTML = `
                <div class="grid-item-agent">
                    <div class="grid-item-agent-label">AGENT</div>
                    <div class="grid-item-name">${avatar.name.toUpperCase()}</div>
                </div>

                <div class="grid-item-content">
                    <div class="grid-item-thumbnail-wrapper">
                        <img src="${avatar.thumbnailUrl}" alt="${avatar.name}">
                    </div>

                    <div class="grid-item-info">
                        <div class="grid-item-tags">
                            ${tags.map(tag => `<div class="grid-item-tag">${tag}</div>`).join('')}
                        </div>
                        <div class="grid-item-description">${briefDesc}</div>
                    </div>
                </div>
            `;
        }

        grid.appendChild(item);
    });
}

function toggleGridView() {
    isGridView = !isGridView;
    const gridContainer = document.getElementById('avatar-grid-container');
    const mainLayout = document.getElementById('main-layout');
    const toggleBtn = document.getElementById('grid-toggle-text-btn');
    const bottomSection = document.querySelector('.bottom-section');

    if (isGridView) {
        gridContainer.style.display = 'block';
        mainLayout.style.display = 'none';
        bottomSection.style.display = 'none'; 
        toggleBtn.textContent = "[ VIEWER ]";
        toggleBtn.style.color = "#fff";
        toggleBtn.style.borderColor = "#fff";
    } else {
        gridContainer.style.display = 'none';
        mainLayout.style.display = 'grid';
        bottomSection.style.display = 'flex'; 
        toggleBtn.textContent = "[ GRID VIEW ]";
        toggleBtn.style.color = "#fff"; 
        toggleBtn.style.borderColor = "rgba(255,255,255,0.4)";
    }
}

function loadAvatar(avatar) {
    if (isModelLoading) return;
    if (!avatar) return;
    
    isModelLoading = true;
    activeAvatar = avatar;

    // Carousel'ı YENİDEN ÇİZ (Ortalamak için)
    renderCircularCarousel();

    updateRightPanel(avatar);
    updateVideo(avatar);
    loadGLBModel(avatar.modelUrl);
}

function updateRightPanel(avatar) {
    const isMobile = window.innerWidth <= 768;

    // Update left panel name
    document.getElementById('avatar-name-big').innerHTML = avatar.name.toUpperCase().replace(' ', '<br>');

    // Update right panel name (for mobile)
    const rightNameEl = document.getElementById('avatar-name-big-right');
    if (rightNameEl) {
        rightNameEl.innerHTML = avatar.name.toUpperCase().replace(' ', '<br>');
    }

    const tagsContainer = document.getElementById('avatar-tags');
    tagsContainer.innerHTML = `
        <div class="tag">FIT #${avatar.fitNo}</div>
        <div class="tag">${avatar.collection.toUpperCase()}</div>
        <div class="tag">PART ${avatar.id <= 7 ? '1' : avatar.id <= 17 ? '2' : '3'}</div>
    `;

    document.getElementById('brief-info').textContent = avatarBriefInfo[avatar.name] || "No description available.";

    const detailInfo = avatarDetailedInfo[avatar.name] || avatarDetailedInfo[Object.keys(avatarDetailedInfo).find(key => key.includes(avatar.name) || avatar.name.includes(key))];

    const detailBox = document.getElementById('detail-text-box');

    // Mobile: Add tags and brief info to detail box
    if (isMobile) {
        const briefDesc = avatarBriefInfo[avatar.name] || "No description available.";
        const tags = [
            `FIT #${avatar.fitNo}`,
            avatar.collection.toUpperCase(),
            `PART ${avatar.id <= 7 ? '1' : avatar.id <= 17 ? '2' : '3'}`
        ];

        let mobileContent = `
            <div class="avatar-tags-mobile">
                ${tags.map(tag => `<div class="tag-mobile">${tag}</div>`).join('')}
            </div>

        `;

        if (detailInfo) {
            mobileContent += `
                <h3>VISUAL DESIGN</h3>

                <h3>SOUND DESIGN</h3>
                <p>${detailInfo.sound}</p>
                <h3>CONCEPTUAL DEPTH</h3>
                <p>${detailInfo.concept}</p>
            `;
        } else {
            mobileContent += `
                <h3>INFORMATION</h3>
                <p>Runway Part: ${avatar.runwayPart}</p>
                <p>Fit Number: #${avatar.fitNo}</p>
                <p>Collection: ${avatar.collection}</p>
            `;
        }

        detailBox.innerHTML = mobileContent;
    } else {
        // Desktop: standard layout
        if (detailInfo) {
            detailBox.innerHTML = `
                <h3>VISUAL DESIGN</h3>
                <p>${detailInfo.visual}</p>
                <h3>SOUND DESIGN</h3>
                <p>${detailInfo.sound}</p>
                <h3>CONCEPTUAL DEPTH</h3>
                <p>${detailInfo.concept}</p>

        } else {
            detailBox.innerHTML = `
                <h3>INFORMATION</h3>
                <p>Runway Part: ${avatar.runwayPart}</p>
                <p>Fit Number: #${avatar.fitNo}</p>
                <p>Collection: ${avatar.collection}</p>

        }
    }
}

function updateVideo(avatar) {
    const video = document.getElementById('main-video');
    video.src = avatar.videoUrl;
    video.load();
    video.play().catch(e => console.log('Video autoplay prevented:', e));
}

function loadGLBModel(modelUrl) {
    document.getElementById('loading-overlay').style.display = 'flex';
    document.getElementById('loading-percentage').textContent = '0%';
    document.getElementById('progress-bar').style.width = '0%';

    if (currentModel) {
        scene.remove(currentModel);
        currentModel = null;
    }

    const loader = new THREE.GLTFLoader();
    if (typeof MeshoptDecoder !== 'undefined') {
        loader.setMeshoptDecoder(MeshoptDecoder);
    }

    loader.load(
        modelUrl,
        (gltf) => {
            currentModel = gltf.scene;
            currentModel.scale.set(CONFIG.viewer.modelScale, CONFIG.viewer.modelScale, CONFIG.viewer.modelScale);
            scene.add(currentModel);

            if (gltf.animations && gltf.animations.length > 0) {
                mixer = new THREE.AnimationMixer(currentModel);
                gltf.animations.forEach(clip => {
                    mixer.clipAction(clip).play();
                });
            }

            document.getElementById('loading-overlay').style.display = 'none';
            isModelLoading = false;
        },
        (progress) => {
            const percent = Math.round((progress.loaded / progress.total) * 100);
            document.getElementById('loading-percentage').textContent = `${percent}%`;
            document.getElementById('progress-bar').style.width = `${percent}%`;
        },
        (error) => {
            console.error('Error loading model:', error);
            document.getElementById('loading-overlay').style.display = 'none';
            isModelLoading = false;
        }
    );
}

function setupEventListeners() {
    document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowLeft') navigateAvatar(-1);
        if (e.key === 'ArrowRight') navigateAvatar(1);
    });
    document.getElementById('grid-toggle-text-btn').addEventListener('click', toggleGridView);
    
    // Carousel Okları
    document.getElementById('carousel-prev').addEventListener('click', () => navigateAvatar(-1));
    document.getElementById('carousel-next').addEventListener('click', () => navigateAvatar(1));
    
    // Carousel Mouse Wheel
    document.getElementById('avatar-carousel').addEventListener('wheel', (e) => {
        e.preventDefault();
        if (e.deltaY > 0) navigateAvatar(1);
        else navigateAvatar(-1);
    });
}

function navigateAvatar(direction) {
    if (!avatarData || avatarData.length === 0) return;
    
    const filteredAvatars = activeCollection === 'ALL' ? avatarData : avatarData.filter(a => a.collection === activeCollection);
    const currentIndex = filteredAvatars.indexOf(activeAvatar);
    let newIndex = currentIndex + direction;
    
    // Sonsuz döngü (Wrap-around)
    if (newIndex < 0) newIndex = filteredAvatars.length - 1;
    if (newIndex >= filteredAvatars.length) newIndex = 0;
    
    loadAvatar(filteredAvatars[newIndex]);
}
