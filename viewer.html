          /* Global styles */
          * {
              margin: 0;
              padding: 0;
              box-sizing: border-box;
              font-family: "Courier New", "Consolas", monospace;
          }

          body {
              background-color: #000;
              overflow: hidden;
              color: #fff;
          }

          /* Grid background */
          .grid-background {
              position: fixed;
              top: 0;
              left: 0;
              right: 0;
              bottom: 0;
              background-color: #000;
              background-image:
                  linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                  linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
              background-size: 50px 50px;
              pointer-events: none;
              z-index: 0;
          }

          /* Main container */
          .container {
              display: flex;
              flex-direction: column;
              height: 100vh;
              width: 100vw;
              margin: 0 auto;
              overflow: hidden;
              position: relative;
          }

          /* Top section with filters */
          .top-section {
              height: 60px;
              width: 100%;
              display: flex;
              align-items: center;
              padding: 15px 30px;
              background-color: rgba(0, 0, 0, 0.8);
              z-index: 10;
              gap: 15px;
              border-bottom: 1px solid rgba(255, 255, 255, 0.1);
          }

          .title {
              font-size: 18px;
              color: #fff;
              font-weight: bold;
              letter-spacing: 2px;
              text-transform: uppercase;
          }

          .collections {
              display: flex;
              gap: 10px;
              margin-left: auto;
          }

          .collection-btn {
              padding: 8px 16px;
              border: 1px solid rgba(255, 255, 255, 0.3);
              border-radius: 0;
              background-color: rgba(0, 0, 0, 0.5);
              cursor: pointer;
              font-size: 11px;
              transition: all 0.2s;
              color: #fff;
              text-transform: uppercase;
              letter-spacing: 1px;
          }

          .collection-btn:hover {
              background-color: rgba(255, 255, 255, 0.1);
              border-color: rgba(255, 255, 255, 0.6);
          }

          .collection-btn.active {
              background-color: rgba(255, 255, 255, 0.2);
              border-color: #fff;
          }

          /* Main layout */
          .main-layout {
              display: grid;
              grid-template-columns: 1fr 300px;
              grid-template-rows: 1fr;
              height: calc(100vh - 140px);
              position: relative;
              z-index: 1;
          }

          /* Left side - GLB viewer with info boxes */
          .viewer-section {
              position: relative;
              overflow: hidden;
          }

          .viewer-container {
              position: absolute;
              top: 0;
              left: 0;
              right: 0;
              bottom: 0;
              z-index: 1;
          }

          #viewer-canvas {
              width: 100%;
              height: 100%;
          }

          /* Crosshair overlay */
          .crosshair-overlay {
              position: absolute;
              top: 0;
              left: 0;
              right: 0;
              bottom: 0;
              pointer-events: none;
              z-index: 2;
          }

          .crosshair-overlay::before,
          .crosshair-overlay::after {
              content: '';
              position: absolute;
              background: rgba(255, 255, 255, 0.3);
          }

          .crosshair-overlay::before {
              top: 50%;
              left: 0;
              right: 0;
              height: 1px;
              transform: translateY(-50%);
          }

          .crosshair-overlay::after {
              left: 50%;
              top: 0;
              bottom: 0;
              width: 1px;
              transform: translateX(-50%);
          }

          /* Scan line effect */
          .scan-effect {
              position: absolute;
              top: 0;
              left: 0;
              right: 0;
              bottom: 0;
              background: repeating-linear-gradient(
                  0deg,
                  rgba(0, 0, 0, 0.1) 0px,
                  rgba(0, 0, 0, 0.1) 1px,
                  transparent 1px,
                  transparent 2px
              );
              pointer-events: none;
              z-index: 3;
              opacity: 0.3;
          }

          /* Info boxes */
          .info-box-top-right {
              position: absolute;
              top: 20px;
              right: 20px;
              width: 350px;
              max-height: 200px;
              background: rgba(0, 0, 0, 0.85);
              border: 1px solid rgba(255, 255, 255, 0.3);
              padding: 15px;
              z-index: 4;
              overflow-y: auto;
          }

          .info-box-top-right h2 {
              font-size: 14px;
              margin-bottom: 10px;
              color: #00ff00;
              text-transform: uppercase;
              letter-spacing: 1px;
          }

          .info-box-top-right p {
              font-size: 11px;
              line-height: 1.5;
              color: #fff;
          }

          .info-box-bottom-left {
              position: absolute;
              bottom: 20px;
              left: 20px;
              width: 400px;
              max-height: 400px;
              background: rgba(0, 0, 0, 0.85);
              border: 1px solid rgba(255, 255, 255, 0.3);
              padding: 15px;
              z-index: 4;
              overflow-y: auto;
          }

          .info-box-bottom-left h2 {
              font-size: 16px;
              margin-bottom: 10px;
              color: #fff;
              text-transform: uppercase;
              letter-spacing: 2px;
          }

              font-size: 12px;
              margin-top: 15px;
              margin-bottom: 8px;
              color: #00ff00;
              text-transform: uppercase;
          }

          .info-box-bottom-left p {
              font-size: 10px;
              line-height: 1.6;
              color: #ccc;
              margin-bottom: 10px;
          }

          /* Scrollbar styling */
          .info-box-top-right::-webkit-scrollbar,
          .info-box-bottom-left::-webkit-scrollbar,
          .video-sidebar::-webkit-scrollbar {
              width: 6px;
          }

          .info-box-top-right::-webkit-scrollbar-track,
          .info-box-bottom-left::-webkit-scrollbar-track,
          .video-sidebar::-webkit-scrollbar-track {
              background: rgba(255, 255, 255, 0.05);
          }

          .info-box-top-right::-webkit-scrollbar-thumb,
          .info-box-bottom-left::-webkit-scrollbar-thumb,
          .video-sidebar::-webkit-scrollbar-thumb {
              background: rgba(255, 255, 255, 0.3);
              border-radius: 3px;
          }

          /* Right side - Video sidebar */
          .video-sidebar {
              background: rgba(0, 0, 0, 0.9);
              border-left: 1px solid rgba(255, 255, 255, 0.1);
              padding: 20px;
              overflow-y: auto;
              z-index: 2;
          }

          .video-item {
              margin-bottom: 25px;
              border: 1px solid rgba(255, 255, 255, 0.2);
              background: rgba(0, 0, 0, 0.5);
              position: relative;
          }

          .video-item-title {
              font-size: 11px;
              color: #00ff00;
              padding: 8px 10px;
              background: rgba(0, 0, 0, 0.8);
              border-bottom: 1px solid rgba(255, 255, 255, 0.2);
              text-transform: uppercase;
              letter-spacing: 1px;
          }

          .video-item-info {
              font-size: 9px;
              color: #888;
              padding: 5px 10px;
              background: rgba(0, 0, 0, 0.6);
              border-bottom: 1px solid rgba(255, 255, 255, 0.1);
          }

          .video-wrapper {
              position: relative;
              width: 100%;
              padding-bottom: 56.25%; /* 16:9 aspect ratio */
              overflow: hidden;
          }

          .video-wrapper video {
              position: absolute;
              top: 0;
              left: 0;
              width: 100%;
              height: 100%;
              object-fit: cover;
          }

          /* Bottom section with thumbnails */
          .bottom-section {
              position: fixed;
              left: 0;
              right: 0;
              bottom: 0;
              height: 80px;
              z-index: 5;
              background: rgba(0, 0, 0, 0.9);
              border-top: 1px solid rgba(255, 255, 255, 0.1);
          }

          .avatar-carousel {
              display: flex;
              justify-content: center;
              align-items: center;
              position: relative;
              width: 100%;
              height: 100%;
              gap: 10px;
              padding: 10px;
              overflow-x: auto;
          }

          .avatar-item {
              width: 60px;
              height: 60px;
              cursor: pointer;
              transition: all 0.3s ease;
              opacity: 0.5;
              border: 2px solid transparent;
              flex-shrink: 0;
          }

          .avatar-item:hover {
              opacity: 0.8;
          }

          .avatar-item.active {
              opacity: 1;
              border-color: #00ff00;

          .avatar-thumbnail {
              width: 100%;
              height: 100%;
              object-fit: contain;
              background-color: #000;
          }

          .loading-overlay {
              position: absolute;
              top: 0;
              left: 0;
              width: 100%;
              height: 100%;
              background-color: rgba(0, 0, 0, 0.9);

              justify-content: center;
              align-items: center;
              z-index: 100;
              color: #00ff00;

          .loading-text {
              font-size: 18px;
              margin-bottom: 10px;

          }

              width: 200px;
              height: 4px;
              background-color: rgba(255, 255, 255, 0.1);
              overflow: hidden;
          }

          .progress-bar {
              height: 100%;
              background-color: #00ff00;
              width: 0%;
              transition: width 0.3s ease;
          }
    </style>

function initMeshoptDecoder() {
    if (typeof MeshoptDecoder === 'undefined') {
        console.error("MeshoptDecoder not available!");
        return;
    }
    THREE.GLTFLoader.prototype.setMeshoptDecoder = function(decoder) {
        this.meshoptDecoder = decoder;
        return this;
    };
}

function initApp() {
    initScene();
    loadAvatarData();
    setupEventListeners();
    document.getElementById('loading-overlay').style.display = 'none';

function initScene() {
    scene = new THREE.Scene();
    scene.background = null;

    const canvasContainer = document.querySelector('.viewer-container');
    const aspect = canvasContainer.clientWidth / canvasContainer.clientHeight;
    camera = new THREE.PerspectiveCamera(50, aspect, 0.01, 1000);
    camera.position.set(CONFIG.viewer.camera.position.x, CONFIG.viewer.camera.position.y, CONFIG.viewer.camera.position.z);

    renderer = new THREE.WebGLRenderer({
        canvas: document.getElementById('viewer-canvas'),
        antialias: true, alpha: true, powerPreference: 'high-performance'
    });
    renderer.setSize(canvasContainer.clientWidth, canvasContainer.clientHeight);
    renderer.outputEncoding = THREE.sRGBEncoding;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.0;
    renderer.physicallyCorrectLights = true;

    controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.enablePan = true;
    controls.minDistance = 1.5;
    controls.maxDistance = 6;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 1.0;
    controls.target.set(CONFIG.viewer.camera.target.x, CONFIG.viewer.camera.target.y, CONFIG.viewer.camera.target.z);
    controls.minPolarAngle = Math.PI / 4;
    controls.maxPolarAngle = Math.PI / 1.5;
    controls.enabled = true;
    controls.update();

    window.addEventListener('resize', onWindowResize);
    setupHDRIEnvironment(activeHdriIndex);
    addBasicLighting();
    animate();
}

function setupHDRIEnvironment(index) {
    const hdriPath = hdriPaths[index];
    const rgbeLoader = new THREE.RGBELoader();
    rgbeLoader.load(hdriPath, function(texture) {
        texture.mapping = THREE.EquirectangularReflectionMapping;
        scene.environment = texture;
    });
}

function addBasicLighting() {
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(5, 10, 7.5);
    scene.add(directionalLight);
}

function animate() {
    requestAnimationFrame(animate);
    if (mixer) mixer.update(clock.getDelta());
    controls.update();
    renderer.render(scene, camera);
}

function onWindowResize() {
    const canvasContainer = document.querySelector('.viewer-container');
    camera.aspect = canvasContainer.clientWidth / canvasContainer.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(canvasContainer.clientWidth, canvasContainer.clientHeight);
}

function populateCollectionButtons() {
    const collectionsContainer = document.getElementById('collections');

    const allBtn = document.createElement('button');
    allBtn.className = 'collection-btn active';
    allBtn.textContent = 'ALL';
    allBtn.onclick = () => filterCollection('ALL');
    collectionsContainer.appendChild(allBtn);

    collections.forEach(collection => {
        const btn = document.createElement('button');
        btn.className = 'collection-btn';
        btn.textContent = collection.toUpperCase();
        btn.onclick = () => filterCollection(collection);
        collectionsContainer.appendChild(btn);
    });
}

function filterCollection(collection) {
    activeCollection = collection;
    document.querySelectorAll('.collection-btn').forEach(btn => {
        btn.classList.toggle('active',
            btn.textContent === collection || (collection === 'ALL' && btn.textContent === 'ALL'));
    });
    populateAvatarCarousel();
}

function populateAvatarCarousel() {
    const carousel = document.getElementById('avatar-carousel');
    carousel.innerHTML = '';

    const filteredAvatars = activeCollection === 'ALL' ?
        avatarData : avatarData.filter(a => a.collection === activeCollection);

    filteredAvatars.forEach((avatar, index) => {
        const item = document.createElement('div');
        item.className = 'avatar-item' + (index === 0 ? ' active' : '');
        item.onclick = () => loadAvatar(avatar);

        const img = document.createElement('img');
        img.className = 'avatar-thumbnail';
        img.src = avatar.thumbnailUrl;
        img.alt = avatar.name;

        item.appendChild(img);
        carousel.appendChild(item);
    });
}

function loadAvatar(avatar) {
    if (isModelLoading) return;
    isModelLoading = true;
    activeAvatar = avatar;

    document.querySelectorAll('.avatar-item').forEach((item, idx) => {
        item.classList.toggle('active', avatarData.indexOf(avatar) === idx);
    });

    updateInfoBoxes(avatar);
    updateVideos(avatar);
    loadGLBModel(avatar.modelUrl);
}

function updateInfoBoxes(avatar) {
    // Update brief info (top right)
    const briefTitle = document.getElementById('avatar-brief-title');
    const briefDesc = document.getElementById('avatar-brief-desc');

    briefTitle.textContent = `${avatar.name.toUpperCase()} / FIT #${avatar.fitNo}`;
    briefDesc.textContent = avatarBriefInfo[avatar.briefInfoId] || avatar.information || "No description available.";

    // Update detailed info (bottom left)
    const detailTitle = document.getElementById('avatar-detail-title');
    const detailContent = document.getElementById('avatar-detail-content');

    detailTitle.textContent = avatar.name.toUpperCase();

    const detailInfo = avatarDetailedInfo[avatar.name];
    if (detailInfo) {
        let html = '';
        detailInfo.sections.forEach(section => {
            html += `<h3>${section.heading}</h3><p>${section.content}</p>`;
        });
        detailContent.innerHTML = html;
    } else {
        detailContent.innerHTML = `<p><strong>Runway Part:</strong> ${avatar.runwayPart}</p>
                                   <p><strong>Fit Number:</strong> ${avatar.fitNo}</p>
                                   <p><strong>Collection:</strong> ${avatar.collection}</p>
                                   <p>${avatar.information}</p>`;
    }
}

function updateVideos(avatar) {
    // Load same video to all 3 slots for now
    for (let i = 1; i <= 3; i++) {
        const video = document.getElementById(`video-${i}`);
        const videoInfo = document.getElementById(`video-info-${i}`);

        video.src = avatar.videoUrl;
        videoInfo.textContent = `FIT #${avatar.fitNo} | ${avatar.runwayPart.toUpperCase()}`;

        video.load();
        video.play().catch(e => console.log('Video autoplay prevented:', e));
    }
}

function loadGLBModel(modelUrl) {
    document.getElementById('loading-overlay').style.display = 'flex';
    document.getElementById('loading-percentage').textContent = '0%';
    document.getElementById('progress-bar').style.width = '0%';

    if (currentModel) {
        scene.remove(currentModel);
        currentModel = null;
    }

    const loader = new THREE.GLTFLoader();
    if (typeof MeshoptDecoder !== 'undefined') {
        loader.setMeshoptDecoder(MeshoptDecoder);
    }

    loader.load(
        modelUrl,
        (gltf) => {
            currentModel = gltf.scene;
            currentModel.scale.set(CONFIG.viewer.modelScale, CONFIG.viewer.modelScale, CONFIG.viewer.modelScale);
            scene.add(currentModel);

            if (gltf.animations && gltf.animations.length > 0) {
                mixer = new THREE.AnimationMixer(currentModel);
                gltf.animations.forEach(clip => {
                    mixer.clipAction(clip).play();
                });
            }

            document.getElementById('loading-overlay').style.display = 'none';
            isModelLoading = false;
        },
        (progress) => {
            const percent = Math.round((progress.loaded / progress.total) * 100);
            document.getElementById('loading-percentage').textContent = `${percent}%`;
            document.getElementById('progress-bar').style.width = `${percent}%`;
        },
        (error) => {
            console.error('Error loading model:', error);
            document.getElementById('loading-overlay').style.display = 'none';
            isModelLoading = false;
        }
    );
}

function setupEventListeners() {
    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowLeft') navigateAvatar(-1);
        if (e.key === 'ArrowRight') navigateAvatar(1);
    });
}

function navigateAvatar(direction) {
    const filteredAvatars = activeCollection === 'ALL' ?
        avatarData : avatarData.filter(a => a.collection === activeCollection);

    const currentIndex = filteredAvatars.indexOf(activeAvatar);
    let newIndex = currentIndex + direction;

    if (newIndex < 0) newIndex = filteredAvatars.length - 1;
    if (newIndex >= filteredAvatars.length) newIndex = 0;

    loadAvatar(filteredAvatars[newIndex]);
}
