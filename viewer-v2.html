    <style>
          /* Global styles */
          * {
              margin: 0;
              padding: 0;
              box-sizing: border-box;
              font-family: "Courier New", "Consolas", monospace;
          }

          body {
              background-color: #000;
              overflow: hidden;
              color: #fff;
          }

          /* Grid background */
          .grid-background {
              position: fixed;
              top: 0;
              left: 0;
              right: 0;
              bottom: 0;
              background-color: #000;
              background-image:
                  linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                  linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
              background-size: 50px 50px;
              pointer-events: none;
              z-index: 0;
          }

          /* Main container */
          .container {
              display: flex;
              flex-direction: column;
              height: 100vh;
              width: 100vw;
              margin: 0 auto;
              overflow: hidden;
              position: relative;
          }

          /* Top section with filters */
          .top-section {
              height: 60px;
              width: 100%;
              display: flex;
              align-items: center;
              padding: 15px 30px;
              background-color: rgba(0, 0, 0, 0.8);
              z-index: 10;
              gap: 15px;
              border-bottom: 1px solid rgba(255, 255, 255, 0.1);
          }

          .title {
              font-size: 18px;
              color: #fff;
              font-weight: bold;
              letter-spacing: 2px;
              text-transform: uppercase;
          }

          .collections {
              display: flex;
              gap: 10px;
              margin-left: auto;
          }

          .collection-btn {
              padding: 8px 16px;
              border: 1px solid rgba(255, 255, 255, 0.3);
              border-radius: 0;
              background-color: rgba(0, 0, 0, 0.5);
              cursor: pointer;
              font-size: 11px;
              transition: all 0.2s;
              color: #fff;
              text-transform: uppercase;
              letter-spacing: 1px;
          }

          .collection-btn:hover {
              background-color: rgba(255, 255, 255, 0.1);
              border-color: rgba(255, 255, 255, 0.6);
          }

          .collection-btn.active {
              background-color: rgba(255, 255, 255, 0.2);
              border-color: #fff;
          }

          /* Main layout */
          .main-layout {
              display: grid;
              grid-template-columns: 1fr 300px;
              grid-template-rows: 1fr;
              height: calc(100vh - 140px);
              position: relative;
              z-index: 1;
          }

          /* Left side - GLB viewer with info boxes */
          .viewer-section {
              position: relative;
              overflow: hidden;
          }

          .viewer-container {
              position: absolute;
              top: 0;
              left: 0;
              right: 0;
              bottom: 0;
              z-index: 1;
          }

          #viewer-canvas {
              width: 100%;
              height: 100%;
              filter: blur(0.5px) brightness(1.2) saturate(0.7);
          }

          /* Crosshair overlay */
          .crosshair-overlay {
              position: absolute;
              top: 0;
              left: 0;
              right: 0;
              bottom: 0;
              pointer-events: none;
              z-index: 2;
          }

          .crosshair-overlay::before,
          .crosshair-overlay::after {
              content: '';
              position: absolute;
              background: rgba(255, 255, 255, 0.3);
          }

          .crosshair-overlay::before {
              top: 50%;
              left: 0;
              right: 0;
              height: 1px;
              transform: translateY(-50%);
          }

          .crosshair-overlay::after {
              left: 50%;
              top: 0;
              bottom: 0;
              width: 1px;
              transform: translateX(-50%);
          }

          /* Scan line effect */
          .scan-effect {
              position: absolute;
              top: 0;
              left: 0;
              right: 0;
              bottom: 0;
              background: repeating-linear-gradient(
                  0deg,
                  rgba(0, 0, 0, 0.1) 0px,
                  rgba(0, 0, 0, 0.1) 1px,
                  transparent 1px,
                  transparent 2px
              );
              pointer-events: none;
              z-index: 3;
              opacity: 0.3;
          }

          /* Info boxes */
          .info-box-top-right {
              position: absolute;
              top: 20px;
              right: 20px;
              width: 350px;
              max-height: 200px;
              background: rgba(0, 0, 0, 0.85);
              border: 1px solid rgba(255, 255, 255, 0.3);
              padding: 15px;
              padding-top: 70px;
              z-index: 4;
              overflow-y: auto;
          }

          .info-box-top-right h2 {
              font-size: 14px;
              margin-bottom: 10px;
              color: #fff;
              text-transform: uppercase;
              letter-spacing: 1px;
          }

          .info-box-top-right p {
              font-size: 11px;
              line-height: 1.5;
              color: #fff;
          }

          .info-box-bottom-left {
              position: absolute;
              bottom: 20px;
              left: 20px;
              width: 400px;
              max-height: 400px;
              background: rgba(0, 0, 0, 0.85);
              border: 1px solid rgba(255, 255, 255, 0.3);
              padding: 15px;
              padding-top: 70px;
              z-index: 4;
              overflow-y: auto;
          }

          .info-box-bottom-left h2 {
              font-size: 16px;
              margin-bottom: 10px;
              color: #fff;
              text-transform: uppercase;
              letter-spacing: 2px;
          }

          .info-box-bottom-left h3 {
              font-size: 12px;
              margin-top: 15px;
              margin-bottom: 8px;
              color: #fff;
              text-transform: uppercase;
          }

          .info-box-bottom-left p {
              font-size: 10px;
              line-height: 1.6;
              color: #ccc;
              margin-bottom: 10px;
          }

          /* Avatar thumbnail in info boxes */
          .info-box-thumbnail {
              position: absolute;
              top: 10px;
              left: 10px;
              width: 50px;
              height: 50px;
              border: 1px solid rgba(255, 255, 255, 0.3);
              filter: blur(1px);
              object-fit: contain;
              background: #000;
          }

          /* Scrollbar styling */
          .info-box-top-right::-webkit-scrollbar,
          .info-box-bottom-left::-webkit-scrollbar,
          .video-sidebar::-webkit-scrollbar {
              width: 6px;
          }

          .info-box-top-right::-webkit-scrollbar-track,
          .info-box-bottom-left::-webkit-scrollbar-track,
          .video-sidebar::-webkit-scrollbar-track {
              background: rgba(255, 255, 255, 0.05);
          }

          .info-box-top-right::-webkit-scrollbar-thumb,
          .info-box-bottom-left::-webkit-scrollbar-thumb,
          .video-sidebar::-webkit-scrollbar-thumb {
              background: rgba(255, 255, 255, 0.3);
              border-radius: 3px;
          }

          /* Right side - Video sidebar */
          .video-sidebar {
              background: rgba(0, 0, 0, 0.9);
              border-left: 1px solid rgba(255, 255, 255, 0.1);
              padding: 20px;
              overflow-y: auto;
              z-index: 2;
          }

          .video-item {
              margin-bottom: 25px;
              border: 1px solid rgba(255, 255, 255, 0.2);
              background: rgba(0, 0, 0, 0.5);
              position: relative;
          }

          .video-item-title {
              font-size: 11px;
              color: #fff;
              padding: 8px 10px;
              background: rgba(0, 0, 0, 0.8);
              border-bottom: 1px solid rgba(255, 255, 255, 0.2);
              text-transform: uppercase;
              letter-spacing: 1px;
          }

          .video-item-info {
              font-size: 9px;
              color: #888;
              padding: 5px 10px;
              background: rgba(0, 0, 0, 0.6);
              border-bottom: 1px solid rgba(255, 255, 255, 0.1);
          }

          .video-wrapper {
              position: relative;
              width: 100%;
              padding-bottom: 56.25%; /* 16:9 aspect ratio */
              overflow: hidden;
          }

          .video-wrapper video {
              position: absolute;
              top: 0;
              left: 0;
              width: 100%;
              height: 100%;
              object-fit: cover;
              filter: blur(0.3px);
          }

          /* Bottom section with thumbnails */
          .bottom-section {
              position: fixed;
              left: 0;
              right: 0;
              bottom: 0;
              height: 80px;
              z-index: 5;
              background: rgba(0, 0, 0, 0.9);
              border-top: 1px solid rgba(255, 255, 255, 0.1);
          }

          .avatar-carousel {
              display: flex;
              justify-content: center;
              align-items: center;
              position: relative;
              width: 100%;
              height: 100%;
              gap: 10px;
              padding: 10px;
              overflow-x: auto;
          }

          .avatar-item {
              width: 60px;
              height: 60px;
              cursor: pointer;
              transition: all 0.3s ease;
              opacity: 0.5;
              border: 2px solid transparent;
              flex-shrink: 0;
          }

          .avatar-item:hover {
              opacity: 0.8;
          }

          .avatar-item.active {
              opacity: 1;
              border-color: #fff;
              box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
          }

          .avatar-thumbnail {
              width: 100%;
              height: 100%;
              object-fit: contain;
              background-color: #000;
          }

          .loading-overlay {
              position: absolute;
              top: 0;
              left: 0;
              width: 100%;
              height: 100%;
              background-color: rgba(0, 0, 0, 0.9);
              display: flex;
              flex-direction: column;
              justify-content: center;
              align-items: center;
              z-index: 100;
              color: #fff;
          }

          .loading-text {
              font-size: 18px;
              margin-bottom: 10px;
              letter-spacing: 2px;
          }

          .loading-progress {
              width: 200px;
              height: 4px;
              background-color: rgba(255, 255, 255, 0.1);
              overflow: hidden;
          }

          .progress-bar {
              height: 100%;
              background-color: #fff;
              width: 0%;
              transition: width 0.3s ease;
          }

          /* Avatar Grid View Styles */
          .avatar-grid-container {
              position: absolute;
              top: 60px;
              left: 0;
              right: 0;
              bottom: 80px;
              padding: 15px;
              overflow-y: auto;
              z-index: 6;
              background-color: rgba(0, 0, 0, 0.95);
              display: none;
          }

          .avatar-grid {
              display: grid;
              grid-template-columns: repeat(7, 1fr);
              gap: 20px;
              padding: 10px;
          }

          .grid-item {
              width: 100%;
              aspect-ratio: 1;
              cursor: pointer;
              transition: all 0.2s ease;
              position: relative;
              border-radius: 0;
              overflow: hidden;
              display: flex;
              align-items: flex-end;
              justify-content: center;
          }

          .grid-item img {
              width: 100%;
              height: 100%;
              object-fit: contain;
              border: 2px solid transparent;
              transition: all 0.3s ease;
              background-color: #000;
              margin-bottom: 0;
          }

          .grid-item:hover img {
              transform: scale(1.05);
              border-color: rgba(255, 255, 255, 0.8);
          }

          .grid-item-name {
              position: absolute;
              bottom: 0;
              left: 0;
              right: 0;
              background-color: rgba(0, 0, 0, 0.7);
              color: white;
              padding: 5px;
              font-size: 10px;
              text-align: center;
              opacity: 0;
              transition: opacity 0.3s ease;
              word-break: break-word;
          }

          .grid-item:hover .grid-item-name {
              opacity: 1;
          }

          .grid-toggle-button {
              position: absolute;
              bottom: 150px;
              left: 50%;
              transform: translateX(-50%);
              width: 40px;
              height: 40px;
              background-color: rgba(255, 255, 255, 0.85);
              border-radius: 50%;
              display: flex;
              justify-content: center;
              align-items: center;
              cursor: pointer;
              z-index: 10;
              box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
              transition: all 0.3s ease;
          }

          .grid-toggle-button:hover {
              background-color: rgba(220, 220, 220, 0.9);
          }

          .no-results {
              grid-column: 1 / -1;
              text-align: center;
              padding: 20px;
              font-size: 14px;
              color: #666;
          }
    </style>

function initMeshoptDecoder() {
    if (typeof MeshoptDecoder === 'undefined') {
        console.error("MeshoptDecoder not available!");
        return;
    }
    THREE.GLTFLoader.prototype.setMeshoptDecoder = function(decoder) {
        this.meshoptDecoder = decoder;
        return this;
    };
}

function initApp() {
    initScene();
    loadAvatarData();
    setupEventListeners();
    document.getElementById('loading-overlay').style.display = 'none';
}

function initScene() {
    scene = new THREE.Scene();
    scene.background = null;

    const canvasContainer = document.querySelector('.viewer-container');
    const aspect = canvasContainer.clientWidth / canvasContainer.clientHeight;
    camera = new THREE.PerspectiveCamera(50, aspect, 0.01, 1000);
    camera.position.set(CONFIG.viewer.camera.position.x, CONFIG.viewer.camera.position.y, CONFIG.viewer.camera.position.z);

    renderer = new THREE.WebGLRenderer({
        canvas: document.getElementById('viewer-canvas'),
        antialias: true, alpha: true, powerPreference: 'high-performance'
    });
    renderer.setSize(canvasContainer.clientWidth, canvasContainer.clientHeight);
    renderer.outputEncoding = THREE.sRGBEncoding;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.0;
    renderer.physicallyCorrectLights = true;

    controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.enablePan = true;
    controls.minDistance = 1.5;
    controls.maxDistance = 6;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 1.0;
    controls.target.set(CONFIG.viewer.camera.target.x, CONFIG.viewer.camera.target.y, CONFIG.viewer.camera.target.z);
    controls.minPolarAngle = Math.PI / 4;
    controls.maxPolarAngle = Math.PI / 1.5;
    controls.enabled = true;
    controls.update();

    window.addEventListener('resize', onWindowResize);
    setupHDRIEnvironment(activeHdriIndex);
    addBasicLighting();
    animate();
}

function setupHDRIEnvironment(index) {
    const hdriPath = hdriPaths[index];
    const rgbeLoader = new THREE.RGBELoader();
    rgbeLoader.load(hdriPath, function(texture) {
        texture.mapping = THREE.EquirectangularReflectionMapping;
        scene.environment = texture;
    });
}

function addBasicLighting() {
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(5, 10, 7.5);
    scene.add(directionalLight);
}

function animate() {
    requestAnimationFrame(animate);
    if (mixer) mixer.update(clock.getDelta());
    controls.update();
    renderer.render(scene, camera);
}

function onWindowResize() {
    const canvasContainer = document.querySelector('.viewer-container');
    camera.aspect = canvasContainer.clientWidth / canvasContainer.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(canvasContainer.clientWidth, canvasContainer.clientHeight);
}

function populateCollectionButtons() {
    const collectionsContainer = document.getElementById('collections');

    const allBtn = document.createElement('button');
    allBtn.className = 'collection-btn active';
    allBtn.textContent = 'ALL';
    allBtn.onclick = () => filterCollection('ALL');
    collectionsContainer.appendChild(allBtn);

    collections.forEach(collection => {
        const btn = document.createElement('button');
        btn.className = 'collection-btn';
        btn.textContent = collection.toUpperCase();
        btn.onclick = () => filterCollection(collection);
        collectionsContainer.appendChild(btn);
    });
}

function filterCollection(collection) {
    activeCollection = collection;
    document.querySelectorAll('.collection-btn').forEach(btn => {
        btn.classList.toggle('active',
            btn.textContent === collection || (collection === 'ALL' && btn.textContent === 'ALL'));
    });
    populateAvatarCarousel();
    populateAvatarGrid();
}

function populateAvatarCarousel() {
    const carousel = document.getElementById('avatar-carousel');
    carousel.innerHTML = '';

    const filteredAvatars = activeCollection === 'ALL' ?
        avatarData : avatarData.filter(a => a.collection === activeCollection);

    filteredAvatars.forEach((avatar, index) => {
        const item = document.createElement('div');
        item.className = 'avatar-item' + (index === 0 ? ' active' : '');
        item.onclick = () => {
            if (isGridView) {
                toggleGridView();
            }
            loadAvatar(avatar);
        };

        const img = document.createElement('img');
        img.className = 'avatar-thumbnail';
        img.src = avatar.thumbnailUrl;
        img.alt = avatar.name;

        item.appendChild(img);
        carousel.appendChild(item);
    });
}

function populateAvatarGrid() {
    const grid = document.getElementById('avatar-grid');
    grid.innerHTML = '';

    const filteredAvatars = activeCollection === 'ALL' ?
        avatarData : avatarData.filter(a => a.collection === activeCollection);

    filteredAvatars.forEach((avatar) => {
        const item = document.createElement('div');
        item.className = 'grid-item';
        item.onclick = () => {
            toggleGridView();
            loadAvatar(avatar);
        };

        const img = document.createElement('img');
        img.src = avatar.thumbnailUrl;
        img.alt = avatar.name;

        const name = document.createElement('div');
        name.className = 'grid-item-name';
        name.textContent = avatar.name;

        item.appendChild(img);
        item.appendChild(name);
        grid.appendChild(item);
    });
}

function toggleGridView() {
    isGridView = !isGridView;
    const gridContainer = document.getElementById('avatar-grid-container');
    const mainLayout = document.getElementById('main-layout');

    if (isGridView) {
        gridContainer.style.display = 'block';
        mainLayout.style.display = 'none';
    } else {
        gridContainer.style.display = 'none';
        mainLayout.style.display = 'grid';
    }
}

function loadAvatar(avatar) {
    if (isModelLoading) return;
    isModelLoading = true;
    activeAvatar = avatar;

    document.querySelectorAll('.avatar-item').forEach((item, idx) => {
        item.classList.toggle('active', avatarData.indexOf(avatar) === idx);
    });

    updateInfoBoxes(avatar);
    updateVideos(avatar);
    loadGLBModel(avatar.modelUrl);
}

function updateInfoBoxes(avatar) {
    // Update thumbnails
    document.getElementById('thumbnail-top').src = avatar.thumbnailUrl;
    document.getElementById('thumbnail-bottom').src = avatar.thumbnailUrl;

    // Update brief info (top right)
    const briefTitle = document.getElementById('avatar-brief-title');
    const briefDesc = document.getElementById('avatar-brief-desc');

    briefTitle.textContent = `${avatar.name.toUpperCase()} / FIT #${avatar.fitNo}`;
    briefDesc.textContent = avatarBriefInfo[avatar.briefInfoId] || "No description available.";

    // Update detailed info (bottom left)
    const detailTitle = document.getElementById('avatar-detail-title');
    const detailContent = document.getElementById('avatar-detail-content');

    detailTitle.textContent = avatar.name.toUpperCase();

    const detailInfo = avatarDetailedInfo[avatar.name];
    if (detailInfo) {
        let html = '';
        detailInfo.sections.forEach(section => {
            html += `<h3>${section.heading}</h3><p>${section.content}</p>`;
        });
        detailContent.innerHTML = html;
    } else {
        detailContent.innerHTML = `<p><strong>Runway Part:</strong> ${avatar.runwayPart}</p>
                                   <p><strong>Fit Number:</strong> ${avatar.fitNo}</p>
                                   <p><strong>Collection:</strong> ${avatar.collection}</p>`;
    }
}

function updateVideos(avatar) {
    // Load only ONE video
    const video = document.getElementById('video-1');
    const videoInfo = document.getElementById('video-info-1');

    video.src = avatar.videoUrl;
    videoInfo.textContent = `FIT #${avatar.fitNo} | ${avatar.runwayPart.toUpperCase()}`;

    video.load();
    video.play().catch(e => console.log('Video autoplay prevented:', e));
}

function loadGLBModel(modelUrl) {
    document.getElementById('loading-overlay').style.display = 'flex';
    document.getElementById('loading-percentage').textContent = '0%';
    document.getElementById('progress-bar').style.width = '0%';

    if (currentModel) {
        scene.remove(currentModel);
        currentModel = null;
    }

    const loader = new THREE.GLTFLoader();
    if (typeof MeshoptDecoder !== 'undefined') {
        loader.setMeshoptDecoder(MeshoptDecoder);
    }

    loader.load(
        modelUrl,
        (gltf) => {
            currentModel = gltf.scene;
            currentModel.scale.set(CONFIG.viewer.modelScale, CONFIG.viewer.modelScale, CONFIG.viewer.modelScale);
            scene.add(currentModel);

            if (gltf.animations && gltf.animations.length > 0) {
                mixer = new THREE.AnimationMixer(currentModel);
                gltf.animations.forEach(clip => {
                    mixer.clipAction(clip).play();
                });
            }

            document.getElementById('loading-overlay').style.display = 'none';
            isModelLoading = false;
        },
        (progress) => {
            const percent = Math.round((progress.loaded / progress.total) * 100);
            document.getElementById('loading-percentage').textContent = `${percent}%`;
            document.getElementById('progress-bar').style.width = `${percent}%`;
        },
        (error) => {
            console.error('Error loading model:', error);
            document.getElementById('loading-overlay').style.display = 'none';
            isModelLoading = false;
        }
    );
}

function setupEventListeners() {
    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowLeft') navigateAvatar(-1);
        if (e.key === 'ArrowRight') navigateAvatar(1);
    });

    // Grid toggle button
    document.getElementById('grid-toggle-button').addEventListener('click', toggleGridView);
}

function navigateAvatar(direction) {
    const filteredAvatars = activeCollection === 'ALL' ?
        avatarData : avatarData.filter(a => a.collection === activeCollection);

    const currentIndex = filteredAvatars.indexOf(activeAvatar);
    let newIndex = currentIndex + direction;

    if (newIndex < 0) newIndex = filteredAvatars.length - 1;
    if (newIndex >= filteredAvatars.length) newIndex = 0;

    loadAvatar(filteredAvatars[newIndex]);
}
    </script>
